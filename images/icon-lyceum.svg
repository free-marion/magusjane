<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Athena's owl -->
  <!-- Body -->
  <ellipse cx="50" cy="62" rx="22" ry="28" fill="#c8a850" stroke="#7a5e18" stroke-width="1.5"/>
  <!-- Wing texture -->
  <path d="M30,55 Q28,72 32,88" stroke="#7a5e18" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M70,55 Q72,72 68,88" stroke="#7a5e18" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M35,65 Q50,70 65,65" stroke="#7a5e18" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M33,74 Q50,80 67,74" stroke="#7a5e18" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Head -->
  <circle cx="50" cy="36" r="18" fill="#d4b060" stroke="#7a5e18" stroke-width="1.5"/>
  <!-- Ear tufts -->
  <polygon points="38,20 34,8 42,16" fill="#c8a850" stroke="#7a5e18" stroke-width="1"/>
  <polygon points="62,20 66,8 58,16" fill="#c8a850" stroke="#7a5e18" stroke-width="1"/>
  <!-- Eyes -->
  <circle cx="42" cy="36" r="7" fill="#1a1a0a" stroke="#7a5e18" stroke-width="1.2"/>
  <circle cx="58" cy="36" r="7" fill="#1a1a0a" stroke="#7a5e18" stroke-width="1.2"/>
  <circle cx="42" cy="36" r="4" fill="#e8c020"/>
  <circle cx="58" cy="36" r="4" fill="#e8c020"/>
  <circle cx="43" cy="35" r="1.5" fill="#0a0a0a"/>
  <circle cx="59" cy="35" r="1.5" fill="#0a0a0a"/>
  <circle cx="43.8" cy="34.2" r="0.6" fill="white"/>
  <circle cx="59.8" cy="34.2" r="0.6" fill="white"/>
  <!-- Beak -->
  <polygon points="50,42 46,48 54,48" fill="#c87020" stroke="#7a5e18" stroke-width="0.8"/>
  <!-- Feet -->
  <path d="M40,88 L36,96 M40,88 L40,96 M40,88 L44,96" stroke="#7a5e18" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M60,88 L56,96 M60,88 L60,96 M60,88 L64,96" stroke="#7a5e18" stroke-width="1.5" stroke-linecap="round"/>
</svg>
