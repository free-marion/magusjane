<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magus Jane</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Share+Tech+Mono&family=IM+Fell+English:ital@0;1&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #030303;
      width: 100vw; height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #matrix {
      position: fixed;
      inset: 0;
      z-index: 0;
      transition: opacity 2s ease;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 15%, rgba(3,3,3,0.45) 55%, rgba(3,3,3,0.9) 100%);
      pointer-events: none;
      z-index: 1;
      transition: opacity 2s ease;
    }

    /* ── BOOK ───────────────────────────────────────────── */
    .scene {
      z-index: 10;
      position: relative;
      perspective: 1200px;
    }

    #bookCover {
      width: 300px;
      height: 300px;
      object-fit: cover;
      cursor: pointer;
      display: block;
      border-radius: 4px;
      transform: rotateX(5deg) rotateY(-8deg);
      transition: transform 0.4s ease, filter 0.4s ease, opacity 0.35s ease;
      filter:
        drop-shadow(-14px 8px 30px rgba(0,0,0,0.95))
        drop-shadow(0 50px 55px rgba(0,0,0,0.85))
        drop-shadow(0 0 50px rgba(80,0,0,0.18));
    }

    #bookCover:hover {
      transform: rotateX(4deg) rotateY(-6deg);
      filter:
        drop-shadow(-14px 8px 30px rgba(0,0,0,0.95))
        drop-shadow(0 50px 55px rgba(0,0,0,0.85))
        drop-shadow(0 0 80px rgba(120,0,0,0.35));
    }

    /* ── DARK OVERLAY ───────────────────────────────────── */
    #darkOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 20;
      pointer-events: none;
      transition: background 1.4s ease;
    }
    #darkOverlay.active { background: rgba(0,0,0,0.82); }

    /* ── ANIMATION CANVAS ───────────────────────────────── */
    #animCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 30;
      display: none;
    }

    /* ── PAGE REVEAL ────────────────────────────────────── */
    #pageReveal {
      position: fixed;
      inset: 0;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }
    #pageReveal.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── PAGE CONTENT ───────────────────────────────────── */
    #pageContent {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      z-index: 1;
    }

    .page-border {
      position: absolute;
      inset: clamp(12px, 3vw, 40px);
      border: 1px solid rgba(80,40,10,0.25);
      pointer-events: none;
    }
    .page-border::before { content:'✦'; position:absolute; top:-7px; left:-7px; color:rgba(80,40,10,0.4); font-size:0.7rem; }
    .page-border::after  { content:'✦'; position:absolute; bottom:-7px; right:-7px; color:rgba(80,40,10,0.4); font-size:0.7rem; }

    .page-ornament-top {
      font-family: 'IM Fell English', serif;
      font-size: clamp(0.6rem, 1.3vw, 0.9rem);
      color: rgba(80,40,10,0.4);
      letter-spacing: 0.6em;
      margin-bottom: clamp(0.6rem, 2vh, 1.2rem);
    }

    .ink-inscription {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 3.5vw, 2rem);
      color: #2a1005;
      text-align: center;
      line-height: 1.45;
      letter-spacing: 0.02em;
      margin-bottom: clamp(1rem, 3vh, 2rem);
      filter: url(#inkBleed);
      text-shadow:
        0 0 1px rgba(20,8,0,0.9),
        1px 1px 3px rgba(20,8,0,0.3);
    }

    .ink-rule {
      width: min(340px, 70vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(80,40,10,0.4), transparent);
      margin-bottom: clamp(1rem, 3vh, 2rem);
      position: relative;
    }
    .ink-rule::before {
      content: '⬥';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      color: rgba(80,40,10,0.3);
      font-size: 0.55rem;
    }

    /* ── PUZZLE ─────────────────────────────────────────── */
    #puzzleWrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .puzzle-tile {
      display: block;
      cursor: pointer;
      border: 1px solid rgba(120,80,20,0.3);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .puzzle-tile:hover {
      transform: scaleX(1.015);
      box-shadow: 0 0 12px rgba(160,110,20,0.3);
    }

    .puzzle-tile.selected {
      transform: scaleX(1.02);
      box-shadow:
        0 0 0 2px rgba(190,150,40,0.9),
        0 0 24px rgba(190,150,40,0.45);
      border-color: rgba(190,150,40,0.8);
      z-index: 2;
      position: relative;
    }

    .puzzle-tile.solved {
      animation: tile-solved 0.8s ease forwards;
    }

    @keyframes tile-solved {
      0%   { box-shadow: 0 0 0 2px rgba(190,150,40,0.8); }
      40%  { box-shadow: 0 0 40px rgba(190,150,40,1), 0 0 80px rgba(190,150,40,0.4); }
      100% { box-shadow: 0 0 8px rgba(190,150,40,0.4); }
    }

    .puzzle-hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(80,40,10,0.35);
      margin-top: 0.9rem;
      text-align: center;
    }

    /* ── COMING SOON ────────────────────────────────────── */
    #comingSoon {
      position: fixed;
      inset: 0;
      background: #030303;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2.5s ease;
    }
    #comingSoon.visible { opacity: 1; pointer-events: all; }

    .cs-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #8b0000;
      margin-bottom: 1.2rem;
      opacity: 0;
      transition: opacity 1s ease 1s;
    }
    #comingSoon.visible .cs-eyebrow { opacity: 1; }

    .cs-title {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(2.5rem, 9vw, 6rem);
      color: #c8b89a;
      text-shadow: 0 0 30px rgba(139,0,0,0.3), 0 0 80px rgba(139,0,0,0.1), 2px 2px 0 #000;
      line-height: 1;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.2s ease 0.5s, transform 1.2s ease 0.5s;
    }
    #comingSoon.visible .cs-title { opacity: 1; transform: translateY(0); }

    .cs-rule {
      width: 200px; height: 1px;
      background: linear-gradient(90deg, transparent, #8b0000, transparent);
      margin: 1.2rem auto;
      opacity: 0;
      transition: opacity 1s ease 1.2s;
    }
    #comingSoon.visible .cs-rule { opacity: 1; }

    .cs-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(200,184,154,0.35);
      opacity: 0;
      transition: opacity 1s ease 1.5s;
    }
    #comingSoon.visible .cs-sub { opacity: 1; }
  </style>
</head>
<body>

  <!-- Ink bleed SVG filter -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="inkBleed" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04 0.04" numOctaves="3" result="noise" seed="7"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G" result="d"/>
        <feGaussianBlur in="d" stdDeviation="0.25"/>
      </filter>
    </defs>
  </svg>

  <canvas id="matrix"></canvas>
  <div class="vignette" id="vignette"></div>
  <div id="darkOverlay"></div>

  <!-- BOOK -->
  <div class="scene">
    <img id="bookCover" src="images/cover.png" alt="Magus Jane" onclick="openBook()" />
  </div>

  <!-- ANIMATION CANVAS -->
  <canvas id="animCanvas"></canvas>

  <!-- PAGE REVEAL -->
  <div id="pageReveal">
    <div id="pageContent">
      <div class="page-border"></div>
      <div class="page-ornament-top">— ✦ ✦ ✦ —</div>
      <div class="ink-inscription">Restore that which<br>was scattered</div>
      <div class="ink-rule"></div>
      <div id="puzzleWrap">
        <!-- tiles injected by JS -->
      </div>
      <div class="puzzle-hint">Select a piece · select another to swap</div>
    </div>
  </div>

  <!-- COMING SOON -->
  <div id="comingSoon">
    <p class="cs-eyebrow">The seal is whole</p>
    <h1 class="cs-title">Magus Jane Solutions</h1>
    <div class="cs-rule"></div>
    <p class="cs-sub">Coming Soon</p>
  </div>

  <script>
    // ── MATRIX RAIN ──────────────────────────────────────────────
    const CIRTH     = 'ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛊᛏᛒᛖᛗᛚᛜᛞᛟᚫᚩᚪᛝᛡᛥᚴᛔᛕ';
    const TENGWAR   = 'කඛගඝඤජඣනටඨදධපඵබභමයරලවශෂසහළඅආඇඈඉඊඋඌඑඒඓ';
    const BS_TOKENS = ['ash','nazg','durb','ulûk','gimb','atul','thraka','agh','burzum','ishi','krimp','û','k'];
    const RING_TEXT = '  ash nazg durbatulûk · ash nazg gimbatul · ash nazg thrakatulûk agh burzum-ishi krimpatul  ';
    const TYPE_CIRTH = 0, TYPE_TENGWAR = 1, TYPE_BS = 2;

    const matrixCanvas = document.getElementById('matrix');
    const ctx = matrixCanvas.getContext('2d');
    let W, H, columns = [], frame = 0;

    function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

    function initCols() {
      W = matrixCanvas.width  = window.innerWidth;
      H = matrixCanvas.height = window.innerHeight;
      const base = 16, count = Math.floor(W / base);
      columns = [];
      for (let i = 0; i < count; i++) {
        const r    = Math.random();
        const type = r < 0.50 ? TYPE_CIRTH : r < 0.80 ? TYPE_TENGWAR : TYPE_BS;
        const dr   = Math.random();
        const depth = dr < 0.40 ? 0 : dr < 0.80 ? 1 : 2;
        const size  = Math.round(base * [0.55, 1.0, 1.5][depth]);
        let speed;
        if      (type === TYPE_CIRTH)   speed = Math.random() * 0.5  + 0.55;
        else if (type === TYPE_TENGWAR) speed = Math.random() * 0.2  + 0.15;
        else                            speed = Math.random() * 0.8  + 0.1;
        columns.push({
          x: i * base, y: Math.random() * -(H / size) * 2,
          type, depth, size, speed,
          bsIdx: 0, bsCharIdx: 0, bsWord: BS_TOKENS[0],
        });
      }
    }

    initCols();
    window.addEventListener('resize', initCols);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(3,3,3,0.052)';
      ctx.fillRect(0, 0, W, H);

      const cx = W/2, cy = H/2;
      const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, 190 + Math.sin(frame*0.018)*40);
      gr.addColorStop(0,   'rgba(100,0,0,0.12)');
      gr.addColorStop(0.5, 'rgba(50,0,0,0.05)');
      gr.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, W, H);

      columns.forEach(col => {
        let char;
        if      (col.type === TYPE_CIRTH)   char = CIRTH[rand(0, CIRTH.length-1)];
        else if (col.type === TYPE_TENGWAR) char = TENGWAR[rand(0, TENGWAR.length-1)];
        else                                char = col.bsWord[col.bsCharIdx % col.bsWord.length];

        const yPx    = col.y * col.size;
        const base   = [0.07, 0.14, 0.27][col.depth];
        const isHead = Math.random() > 0.94;

        if      (col.type === TYPE_CIRTH   && isHead) ctx.fillStyle = 'rgba(220,160,80,0.8)';
        else if (col.type === TYPE_TENGWAR && isHead) ctx.fillStyle = 'rgba(240,210,100,0.85)';
        else if (col.type === TYPE_BS      && isHead) ctx.fillStyle = 'rgba(130,190,50,0.7)';
        else if (col.type === TYPE_CIRTH)              ctx.fillStyle = `rgba(139,0,0,${base+Math.random()*base})`;
        else if (col.type === TYPE_TENGWAR)            ctx.fillStyle = `rgba(170,120,20,${base+Math.random()*base})`;
        else                                           ctx.fillStyle = `rgba(55,90,20,${base+Math.random()*base})`;

        ctx.font = `${col.size}px serif`;
        ctx.fillText(char, col.x, yPx);

        let step = col.speed;
        if (col.type === TYPE_BS) {
          if (Math.random() > 0.92) step *= (Math.random()*3+0.1);
          if (Math.random() > 0.97) step  = 0;
        }
        col.y += step;

        if (col.type === TYPE_BS && frame % 8 === 0) {
          col.bsCharIdx++;
          if (col.bsCharIdx >= col.bsWord.length) {
            col.bsCharIdx = 0;
            col.bsIdx     = (col.bsIdx+1) % BS_TOKENS.length;
            col.bsWord    = BS_TOKENS[col.bsIdx];
          }
        }

        if (yPx > H+20 && Math.random() > 0.97) col.y = -rand(5,30);
      });

      // Ring inscription band
      const cyc = frame % 600;
      let iOp = 0;
      if      (cyc < 60)  iOp = cyc/60*0.18;
      else if (cyc < 300) iOp = 0.18;
      else if (cyc < 420) iOp = (1-(cyc-300)/120)*0.18;

      if (iOp > 0.005) {
        ctx.save();
        ctx.globalAlpha = iOp;
        ctx.font        = '13px "Share Tech Mono",monospace';
        ctx.fillStyle   = 'rgba(180,130,40,1)';
        const tw     = ctx.measureText(RING_TEXT).width;
        const offset = (frame*0.4) % tw;
        ctx.fillText(RING_TEXT, -offset, cy+230);
        ctx.fillText(RING_TEXT, -offset+tw, cy+230);
        ctx.restore();
      }

      frame++;
      requestAnimationFrame(drawMatrix);
    }

    drawMatrix();

    // ── SPRITE SHEET ─────────────────────────────────────────────
    const FRAME_W = 384, FRAME_H = 512, COLS = 4, FRAME_COUNT = 8;
    const FRAME_MS = 160;

    const spriteSheet = new Image();
    spriteSheet.src = 'images/book-spritesheet.png';

    // ── BOOK OPEN ────────────────────────────────────────────────
    let opened = false;

    function openBook() {
      if (opened) return;
      opened = true;

      const bookEl = document.getElementById('bookCover');
      bookEl.style.opacity = '0';

      document.getElementById('matrix').style.opacity   = '0.12';
      document.getElementById('vignette').style.opacity = '0.15';
      document.getElementById('darkOverlay').classList.add('active');

      const aCanvas = document.getElementById('animCanvas');
      aCanvas.width  = window.innerWidth;
      aCanvas.height = window.innerHeight;
      const actx = aCanvas.getContext('2d');
      actx.imageSmoothingEnabled = true;
      actx.imageSmoothingQuality = 'high';

      aCanvas.style.display    = 'block';
      aCanvas.style.opacity    = '0';
      aCanvas.style.transition = 'opacity 0.4s ease';

      function drawFrame(idx) {
        const col = idx % COLS;
        const row = Math.floor(idx / COLS);
        const sx = col * FRAME_W;
        const sy = row * FRAME_H;

        actx.fillStyle = '#030303';
        actx.fillRect(0, 0, aCanvas.width, aCanvas.height);

        const fa = FRAME_W / FRAME_H;
        const ca = aCanvas.width / aCanvas.height;
        let dw, dh, dx, dy;
        if (ca > fa) {
          dw = aCanvas.width;
          dh = dw / fa;
          dx = 0;
          dy = (aCanvas.height - dh) / 2;
        } else {
          dh = aCanvas.height;
          dw = dh * fa;
          dx = (aCanvas.width - dw) / 2;
          dy = 0;
        }
        actx.drawImage(spriteSheet, sx, sy, FRAME_W, FRAME_H, dx, dy, dw, dh);
      }

      function startAnim() {
        let f = 0;
        aCanvas.style.opacity = '1';

        function tick() {
          drawFrame(f);
          f++;
          if (f < FRAME_COUNT) {
            setTimeout(tick, FRAME_MS);
          } else {
            setTimeout(() => {
              buildPuzzle();
              document.getElementById('pageReveal').classList.add('open');
            }, 400);
          }
        }
        tick();
      }

      setTimeout(() => {
        if (spriteSheet.complete) startAnim();
        else spriteSheet.onload = startAnim;
      }, 450);
    }

    // ── PUZZLE ───────────────────────────────────────────────────
    const TILE_COUNT = 4;
    let selectedTile = null;
    let solved = false;

    function buildPuzzle() {
      const coverEl = document.getElementById('bookCover');
      const DISPLAY_W = Math.min(300, window.innerWidth - 80);
      // Cover is square (1024×1024) — each strip is DISPLAY_W × (DISPLAY_W/4)
      const TILE_DISPLAY_H = Math.round(DISPLAY_W / TILE_COUNT);
      const SRC_SIZE = 1024;
      const SRC_STRIP = SRC_SIZE / TILE_COUNT; // 256px per strip

      // Build shuffled order (guaranteed not in-order)
      let order = [0, 1, 2, 3];
      do {
        for (let i = order.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [order[i], order[j]] = [order[j], order[i]];
        }
      } while (order.every((v, i) => v === i));

      const wrap = document.getElementById('puzzleWrap');
      wrap.innerHTML = '';

      order.forEach(srcRow => {
        const tile = document.createElement('canvas');
        tile.width  = DISPLAY_W;
        tile.height = TILE_DISPLAY_H;
        tile.className = 'puzzle-tile';
        tile.dataset.srcRow = srcRow;

        const tc = tile.getContext('2d');
        tc.imageSmoothingEnabled = true;
        tc.imageSmoothingQuality = 'high';
        tc.drawImage(
          coverEl,
          0, srcRow * SRC_STRIP, SRC_SIZE, SRC_STRIP,
          0, 0, DISPLAY_W, TILE_DISPLAY_H
        );

        tile.addEventListener('click', () => handleTileClick(tile));
        wrap.appendChild(tile);
      });
    }

    function handleTileClick(tile) {
      if (solved) return;

      if (!selectedTile) {
        selectedTile = tile;
        tile.classList.add('selected');
        return;
      }

      if (selectedTile === tile) {
        tile.classList.remove('selected');
        selectedTile = null;
        return;
      }

      // Swap the two tiles in the DOM
      const wrap = document.getElementById('puzzleWrap');
      const placeholder = document.createElement('div');
      wrap.insertBefore(placeholder, selectedTile);
      wrap.insertBefore(selectedTile, tile);
      wrap.insertBefore(tile, placeholder);
      wrap.removeChild(placeholder);

      selectedTile.classList.remove('selected');
      selectedTile = null;

      checkSolution();
    }

    function checkSolution() {
      const tiles = [...document.getElementById('puzzleWrap').children];
      if (tiles.every((t, i) => parseInt(t.dataset.srcRow) === i)) {
        solved = true;
        tiles.forEach((t, i) =>
          setTimeout(() => t.classList.add('solved'), i * 120)
        );
        setTimeout(() => document.getElementById('comingSoon').classList.add('visible'), 1600);
      }
    }
  </script>

</body>
</html>
