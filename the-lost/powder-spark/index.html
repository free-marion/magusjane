const NM = {};
NODES.forEach(n => { NM[n.id] = n; });

const MBG = {
  default: "#111318",
  danger:  "#1c1210",
  death:   "#0e0808",
  grief:   "#0c0c10",
  survive: "#0e1a0e",
};

const MAC = {
  default: "#8a7a5a",
  danger:  "#b84a3a",
  death:   "#6a2020",
  grief:   "#5a5a7a",
  survive: "#4a9a4a",
};

function App() {

  const [fade, setFade] = useState(true);

    setFade(false);

      setCur(next);
      setCtx(null);
      setFade(true);
      top.current?.scrollIntoView({ behavior: "smooth" });

    <div style={{
      minHeight: "100vh",
      background: bg,
      transition: "background 0.6s ease",
      padding: "20px 16px",
      boxSizing: "border-box",

          display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6,

          <button
            onClick={() => setCtx(ctx ? null : "telegram")}
            style={{
              background: ctx ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.04)",
              border: "1px solid rgba(255,255,255,0.15)",
              borderRadius: 18, padding: "5px 13px",
              color: ctx ? "#aaa" : "#555",
              fontSize: 10, fontFamily: "Georgia, serif",
              cursor: "pointer", letterSpacing: 1.5,
              textTransform: "uppercase", transition: "all 0.2s ease",

          {ctx && (
            <div style={{ display: "flex", gap: 5 }}>
              {n.telegram && (
                <button
                  onClick={() => setCtx("telegram")}
                  style={{
                    background: ctx === "telegram" ? "rgba(180,160,100,0.15)" : "rgba(255,255,255,0.04)",
                    border: ctx === "telegram" ? "1px solid rgba(180,160,100,0.35)" : "1px solid rgba(255,255,255,0.1)",
                    borderRadius: 14, padding: "4px 11px",
                    color: ctx === "telegram" ? "#b4a064" : "#555",
                    fontSize: 9, fontFamily: "Georgia, serif",
                    cursor: "pointer", letterSpacing: 1, textTransform: "uppercase",
                  }}
                >
                  Field Telegram
                </button>
              )}
              {n.brief && (
                <button
                  onClick={() => setCtx("brief")}
                  style={{
                    background: ctx === "brief" ? "rgba(100,120,180,0.15)" : "rgba(255,255,255,0.04)",
                    border: ctx === "brief" ? "1px solid rgba(100,120,180,0.35)" : "1px solid rgba(255,255,255,0.1)",

                    color: ctx === "brief" ? "#8090c0" : "#555",
                    fontSize: 9, fontFamily: "Georgia, serif",
                    cursor: "pointer", letterSpacing: 1, textTransform: "uppercase",

        maxWidth: 580, margin: "0 auto",
        opacity: fade ? 1 : 0,
        transition: "opacity 0.35s ease",
        paddingTop: 32,

        {ctx && (n.telegram || n.brief) && (
          <div style={{
            background: ctx === "brief" ? "rgba(100,120,180,0.06)" : "rgba(180,160,100,0.06)",

              fontSize: 21, fontWeight: "normal", margin: 0,
              color: isS ? "#6abf6a" : isD ? "#a09888" : "#d4cbb8",

            letterSpacing: 1.5, textTransform: "uppercase",
            fontFamily: "Georgia, serif",
          }}>

        <div style={{ marginBottom: 16 }}>
          {n.text.map((p, i) => (
            <p key={i} style={{
              fontSize: 15, lineHeight: 1.75,
              color: isD ? "#b0a090" : "#c8c0b0",
              fontFamily: "Georgia, serif",
              margin: "0 0 13px 0",

        {n.aftermath && (
          <div style={{
            borderLeft: "2px solid rgba(74,154,74,0.3)",

          }}>
            <p style={{
              fontSize: 13, lineHeight: 1.65, color: "#7a9a6a",
              fontFamily: "Georgia, serif", fontStyle: "italic", margin: 0,
            }}>
              {n.aftermath}
            </p>
          </div>

        {/* CHOICES */}
        <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 4 }}>

              c.label === "Start over" ||
              c.label === "There is nothing you can do." ||
              c.label.startsWith("Play again")

                key={i}
                onClick={() => go(c.next)}
                style={{
                  background: nav
                    ? `${ac}12`
                    : h ? "rgba(184,74,58,0.06)" : "rgba(74,154,74,0.05)",
                  border: nav
                    ? `1px solid ${ac}30`
                    : h ? "1px solid rgba(184,74,58,0.18)" : "1px solid rgba(74,154,74,0.16)",

                  color: nav

        {/* PROLOGUE FOOTER */}
        {cur === "prologue" && (
          <div style={{
            marginTop: 44, textAlign: "center",
            fontSize: 11, color: "#333",
            fontFamily: "Georgia, serif", fontStyle: "italic",
          }}>

        <div style={{ marginTop: 48, textAlign: "center" }}>
          <a href="/the-lost/" style={{
            fontSize: 10, letterSpacing: 3,
            color: "#1a2a1a", fontFamily: "Georgia, serif",
            textDecoration: "none", textTransform: "uppercase",
          }}>

        </div>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
