<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magus Jane</title>
  <link rel="preload" as="image" href="images/cover-nobg.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Share+Tech+Mono&family=IM+Fell+English:ital@0;1&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #030303;
      width: 100vw; height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #matrix {
      position: fixed;
      inset: 0;
      z-index: 0;
      transition: opacity 2s ease;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 15%, rgba(3,3,3,0.45) 55%, rgba(3,3,3,0.92) 100%);
      pointer-events: none;
      z-index: 1;
      transition: opacity 2s ease;
    }

    /* в”Ђв”Ђ BOOK в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    .scene {
      z-index: 10;
      position: relative;
      perspective: 1200px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #bookCover {
      width: min(300px, 70vw);
      height: auto;
      cursor: pointer;
      display: block;
      transform: rotateX(5deg) rotateY(-8deg) translateY(0px);
      animation: levitate 4.5s ease-in-out infinite;
      filter:
        drop-shadow(-10px 6px 24px rgba(0,0,0,0.9))
        drop-shadow(0 30px 50px rgba(0,0,0,0.8))
        drop-shadow(0 0 60px rgba(90,0,0,0.22));
      transition: opacity 0.35s ease, filter 0.4s ease;
    }

    #bookCover:hover {
      filter:
        drop-shadow(-10px 6px 24px rgba(0,0,0,0.9))
        drop-shadow(0 30px 50px rgba(0,0,0,0.8))
        drop-shadow(0 0 90px rgba(130,0,0,0.4));
    }

    @keyframes levitate {
      0%, 100% { transform: rotateX(5deg) rotateY(-8deg) translateY(0px); }
      50%       { transform: rotateX(5deg) rotateY(-8deg) translateY(-16px); }
    }

    #bookCover.opening {
      animation: none;
      transform: rotateX(12deg) rotateY(-40deg) scale(1.04);
      transition: transform 0.28s ease, opacity 0.25s ease 0.22s, filter 0.3s ease;
      opacity: 0;
      filter: drop-shadow(0 0 40px rgba(180,140,60,0.5));
    }

    /* Glow pool beneath the book */
    .book-glow {
      position: absolute;
      bottom: -18px;
      width: 70%;
      height: 28px;
      background: radial-gradient(ellipse, rgba(100,0,0,0.45) 0%, transparent 70%);
      animation: glow-breathe 4.5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glow-breathe {
      0%, 100% { opacity: 0.55; transform: scaleX(1); }
      50%       { opacity: 0.85; transform: scaleX(0.82); }
    }

    /* в”Ђв”Ђ DARK OVERLAY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    #darkOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 20;
      pointer-events: none;
      transition: background 1.2s ease;
    }
    #darkOverlay.active { background: rgba(0,0,0,0.8); }

    /* в”Ђв”Ђ PAGE REVEAL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    #pageReveal {
      position: fixed;
      inset: 0;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      background:
        repeating-linear-gradient(
          0deg,
          transparent, transparent 30px,
          rgba(120,75,20,0.055) 30px, rgba(120,75,20,0.055) 31px
        ),
        linear-gradient(165deg, #f6e5bc 0%, #edd5a0 30%, #e6c98a 60%, #f0d9a8 100%);
    }

    /* Paper noise texture overlay */
    #pageReveal::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.065'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* Edge vignette */
    #pageReveal::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 45%, rgba(90,50,8,0.1) 75%, rgba(70,35,5,0.28) 100%);
      pointer-events: none;
    }

    #pageReveal.open {
      opacity: 1;
      pointer-events: all;
    }

    /* в”Ђв”Ђ PAGE CONTENT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    #pageContent {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      z-index: 1;
    }

    .page-border {
      position: absolute;
      inset: clamp(12px, 3vw, 40px);
      border: 1px solid rgba(80,40,10,0.2);
      pointer-events: none;
    }
    .page-border::before { content:'вњ¦'; position:absolute; top:-7px; left:-7px; color:rgba(80,40,10,0.35); font-size:0.65rem; }
    .page-border::after  { content:'вњ¦'; position:absolute; bottom:-7px; right:-7px; color:rgba(80,40,10,0.35); font-size:0.65rem; }

    .page-ornament-top {
      font-family: 'IM Fell English', serif;
      font-size: clamp(0.55rem, 1.2vw, 0.85rem);
      color: rgba(80,40,10,0.38);
      letter-spacing: 0.6em;
      margin-bottom: clamp(0.5rem, 1.8vh, 1rem);
    }

    .ink-inscription {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.8rem);
      color: #2a1005;
      text-align: center;
      line-height: 1.5;
      margin-bottom: clamp(0.8rem, 2.5vh, 1.8rem);
      filter: url(#inkBleed);
      text-shadow: 1px 1px 3px rgba(20,8,0,0.25);
    }

    .ink-rule {
      width: min(320px, 65vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(80,40,10,0.38), transparent);
      margin-bottom: clamp(0.8rem, 2.5vh, 1.8rem);
      position: relative;
    }
    .ink-rule::before {
      content: 'в¬Ґ';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      color: rgba(80,40,10,0.28);
      font-size: 0.5rem;
    }

    /* в”Ђв”Ђ PUZZLE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    #puzzleWrap {
      display: flex;
      flex-direction: row;
      gap: clamp(8px, 2vw, 16px);
      align-items: center;
      justify-content: center;
    }

    .puzzle-card {
      width: min(140px, 26vw);
      aspect-ratio: 2/3;
      cursor: pointer;
      border: 1px solid rgba(120,80,20,0.3);
      border-radius: 3px;
      overflow: hidden;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      background: rgba(180,140,80,0.15);
      position: relative;
    }

    .puzzle-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* Placeholder shimmer while no image provided */
    .puzzle-card.empty {
      background: linear-gradient(135deg,
        rgba(150,100,30,0.15) 0%,
        rgba(180,140,70,0.08) 50%,
        rgba(150,100,30,0.15) 100%);
    }
    .puzzle-card.empty::after {
      content: '?';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IM Fell English', serif;
      font-size: 2rem;
      color: rgba(80,40,10,0.2);
      font-style: italic;
    }

    .puzzle-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(80,40,10,0.2);
    }

    .puzzle-card.selected {
      transform: translateY(-6px);
      box-shadow:
        0 0 0 2px rgba(190,150,40,0.9),
        0 8px 30px rgba(190,150,40,0.35);
      border-color: rgba(190,150,40,0.8);
    }

    .puzzle-card.solved {
      animation: card-solved 0.9s ease forwards;
    }

    @keyframes card-solved {
      0%   { box-shadow: 0 0 0 2px rgba(190,150,40,0.8); }
      40%  { box-shadow: 0 0 40px rgba(190,150,40,1), 0 0 80px rgba(190,150,40,0.4); }
      100% { box-shadow: 0 0 8px rgba(190,150,40,0.35); }
    }

    .puzzle-hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(80,40,10,0.32);
      margin-top: clamp(0.6rem, 2vh, 1.2rem);
      text-align: center;
    }

    /* в”Ђв”Ђ COMING SOON в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    #comingSoon {
      position: fixed;
      inset: 0;
      background: #030303;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2.5s ease;
    }
    #comingSoon.visible { opacity: 1; pointer-events: all; }

    .cs-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #8b0000;
      margin-bottom: 1.2rem;
      opacity: 0;
      transition: opacity 1s ease 1s;
    }
    #comingSoon.visible .cs-eyebrow { opacity: 1; }

    .cs-title {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(2.5rem, 9vw, 6rem);
      color: #c8b89a;
      text-shadow: 0 0 30px rgba(139,0,0,0.3), 0 0 80px rgba(139,0,0,0.1), 2px 2px 0 #000;
      line-height: 1;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.2s ease 0.5s, transform 1.2s ease 0.5s;
    }
    #comingSoon.visible .cs-title { opacity: 1; transform: translateY(0); }

    .cs-rule {
      width: 200px; height: 1px;
      background: linear-gradient(90deg, transparent, #8b0000, transparent);
      margin: 1.2rem auto;
      opacity: 0;
      transition: opacity 1s ease 1.2s;
    }
    #comingSoon.visible .cs-rule { opacity: 1; }

    .cs-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(200,184,154,0.35);
      opacity: 0;
      transition: opacity 1s ease 1.5s;
    }
    #comingSoon.visible .cs-sub { opacity: 1; }
  </style>
</head>
<body>

  <!-- Ink bleed SVG filter -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="inkBleed" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04 0.04" numOctaves="3" result="noise" seed="7"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G" result="d"/>
        <feGaussianBlur in="d" stdDeviation="0.25"/>
      </filter>
    </defs>
  </svg>

  <canvas id="matrix"></canvas>
  <div class="vignette" id="vignette"></div>
  <div id="darkOverlay"></div>

  <!-- BOOK -->
  <div class="scene">
    <img id="bookCover" src="images/cover-nobg.png" alt="" onclick="openBook()" />
    <div class="book-glow"></div>
  </div>

  <!-- PAGE REVEAL -->
  <div id="pageReveal">
    <div id="pageContent">
      <div class="page-border"></div>
      <div class="page-ornament-top">вЂ” вњ¦ вњ¦ вњ¦ вЂ”</div>
      <div class="ink-inscription">Restore that which<br>was scattered</div>
      <div class="ink-rule"></div>

      <!-- в”Ђв”Ђ PUZZLE CARDS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
           Drop images into magusjane/images/ as p1.png, p2.png, p3.png
           Set CORRECT_ORDER below to the correct sequence (0-indexed)
      в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ -->
      <div id="puzzleWrap"></div>

      <div class="puzzle-hint">Select a card В· select another to swap</div>
    </div>
  </div>

  <!-- COMING SOON -->
  <div id="comingSoon">
    <p class="cs-eyebrow">The seal is whole</p>
    <h1 class="cs-title">Magus Jane Solutions</h1>
    <div class="cs-rule"></div>
    <p class="cs-sub">Coming Soon</p>
  </div>

  <script>
    // в”Ђв”Ђ MATRIX RAIN в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    const CIRTH     = 'бљ бљўбљ¦бљЁбљ±бљІбљ·бљ№бљєбљѕб›Ѓб›ѓб›‡б›€б›‰б›Љб›Џб›’б›–б›—б›љб›њб›ћб›џбљ«бљ©бљЄб›ќб›Ўб›Ґбљґб›”б›•';
    const TENGWAR   = 'а¶ља¶›а¶ња¶ќа¶¤а¶ўа¶Ја¶±а¶§а¶Ёа¶Їа¶°а¶ґа¶µа¶¶а¶·а¶ёа¶єа¶»а¶Ѕа·Ђа·Ѓа·‚а·ѓа·„а·…а¶…а¶†а¶‡а¶€а¶‰а¶Ља¶‹а¶Ња¶‘а¶’а¶“';
    const BS_TOKENS = ['ash','nazg','durb','ulГ»k','gimb','atul','thraka','agh','burzum','ishi','krimp','Г»','k'];
    const RING_TEXT = '  ash nazg durbatulГ»k В· ash nazg gimbatul В· ash nazg thrakatulГ»k agh burzum-ishi krimpatul  ';
    const TYPE_CIRTH = 0, TYPE_TENGWAR = 1, TYPE_BS = 2;

    const matrixCanvas = document.getElementById('matrix');
    const ctx = matrixCanvas.getContext('2d');
    let W, H, columns = [], frame = 0;

    function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

    function initCols() {
      W = matrixCanvas.width  = window.innerWidth;
      H = matrixCanvas.height = window.innerHeight;
      const base = 16, count = Math.floor(W / base);
      columns = [];
      for (let i = 0; i < count; i++) {
        const r    = Math.random();
        const type = r < 0.50 ? TYPE_CIRTH : r < 0.80 ? TYPE_TENGWAR : TYPE_BS;
        const dr   = Math.random();
        const depth = dr < 0.40 ? 0 : dr < 0.80 ? 1 : 2;
        const size  = Math.round(base * [0.55, 1.0, 1.5][depth]);
        let speed;
        if      (type === TYPE_CIRTH)   speed = Math.random() * 0.5  + 0.55;
        else if (type === TYPE_TENGWAR) speed = Math.random() * 0.2  + 0.15;
        else                            speed = Math.random() * 0.8  + 0.1;
        columns.push({
          x: i * base, y: Math.random() * -(H / size) * 2,
          type, depth, size, speed,
          bsIdx: 0, bsCharIdx: 0, bsWord: BS_TOKENS[0],
        });
      }
    }

    initCols();
    window.addEventListener('resize', initCols);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(3,3,3,0.052)';
      ctx.fillRect(0, 0, W, H);

      const cx = W/2, cy = H/2;
      const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, 190 + Math.sin(frame*0.018)*40);
      gr.addColorStop(0,   'rgba(100,0,0,0.12)');
      gr.addColorStop(0.5, 'rgba(50,0,0,0.05)');
      gr.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, W, H);

      columns.forEach(col => {
        let char;
        if      (col.type === TYPE_CIRTH)   char = CIRTH[rand(0, CIRTH.length-1)];
        else if (col.type === TYPE_TENGWAR) char = TENGWAR[rand(0, TENGWAR.length-1)];
        else                                char = col.bsWord[col.bsCharIdx % col.bsWord.length];

        const yPx    = col.y * col.size;
        const base   = [0.07, 0.14, 0.27][col.depth];
        const isHead = Math.random() > 0.94;

        if      (col.type === TYPE_CIRTH   && isHead) ctx.fillStyle = 'rgba(220,160,80,0.8)';
        else if (col.type === TYPE_TENGWAR && isHead) ctx.fillStyle = 'rgba(240,210,100,0.85)';
        else if (col.type === TYPE_BS      && isHead) ctx.fillStyle = 'rgba(130,190,50,0.7)';
        else if (col.type === TYPE_CIRTH)              ctx.fillStyle = `rgba(139,0,0,${base+Math.random()*base})`;
        else if (col.type === TYPE_TENGWAR)            ctx.fillStyle = `rgba(170,120,20,${base+Math.random()*base})`;
        else                                           ctx.fillStyle = `rgba(55,90,20,${base+Math.random()*base})`;

        ctx.font = `${col.size}px serif`;
        ctx.fillText(char, col.x, yPx);

        let step = col.speed;
        if (col.type === TYPE_BS) {
          if (Math.random() > 0.92) step *= (Math.random()*3+0.1);
          if (Math.random() > 0.97) step  = 0;
        }
        col.y += step;

        if (col.type === TYPE_BS && frame % 8 === 0) {
          col.bsCharIdx++;
          if (col.bsCharIdx >= col.bsWord.length) {
            col.bsCharIdx = 0;
            col.bsIdx     = (col.bsIdx+1) % BS_TOKENS.length;
            col.bsWord    = BS_TOKENS[col.bsIdx];
          }
        }

        if (yPx > H+20 && Math.random() > 0.97) col.y = -rand(5,30);
      });

      // Ring inscription band
      const cyc = frame % 600;
      let iOp = 0;
      if      (cyc < 60)  iOp = cyc/60*0.18;
      else if (cyc < 300) iOp = 0.18;
      else if (cyc < 420) iOp = (1-(cyc-300)/120)*0.18;

      if (iOp > 0.005) {
        ctx.save();
        ctx.globalAlpha = iOp;
        ctx.font        = '13px "Share Tech Mono",monospace';
        ctx.fillStyle   = 'rgba(180,130,40,1)';
        const tw     = ctx.measureText(RING_TEXT).width;
        const offset = (frame*0.4) % tw;
        ctx.fillText(RING_TEXT, -offset, cy+230);
        ctx.fillText(RING_TEXT, -offset+tw, cy+230);
        ctx.restore();
      }

      frame++;
      requestAnimationFrame(drawMatrix);
    }

    drawMatrix();

    // в”Ђв”Ђ BOOK OPEN в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    let opened = false;

    function openBook() {
      if (opened) return;
      opened = true;

      const book = document.getElementById('bookCover');
      const glow = document.querySelector('.book-glow');

      // One-frame open: tilt to same angle, suggest cover lifting
      book.classList.add('opening');
      if (glow) { glow.style.transition = 'opacity 0.3s'; glow.style.opacity = '0'; }

      document.getElementById('matrix').style.opacity   = '0.1';
      document.getElementById('vignette').style.opacity = '0.12';
      document.getElementById('darkOverlay').classList.add('active');

      // Book fades out mid-tilt в†’ parchment fades in
      setTimeout(() => {
        buildPuzzle();
        document.getElementById('pageReveal').classList.add('open');
      }, 520);
    }

    // в”Ђв”Ђ PUZZLE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    // Add your 3 images as p1.png, p2.png, p3.png in magusjane/images/
    // CORRECT_ORDER: indices in the correct sequence leftв†’right
    // Example: [2,0,1] means p3 should be first, p1 second, p2 third
    const PUZZLE_IMAGES  = ['images/Jake.jpg', 'images/John-Cena-960x540-3383925362.jpg', 'images/angel.jpg'];
    const CORRECT_ORDER  = [0, 1, 2]; // Jake в†’ John Cena в†’ Angel

    let selectedCard = null;
    let puzzleSolved = false;

    function buildPuzzle() {
      // Shuffled display order (guaranteed not already correct)
      let order = [0, 1, 2];
      do {
        for (let i = order.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [order[i], order[j]] = [order[j], order[i]];
        }
      } while (order.join() === CORRECT_ORDER.join());

      const wrap = document.getElementById('puzzleWrap');
      wrap.innerHTML = '';

      order.forEach(imgIdx => {
        const card = document.createElement('div');
        card.className = 'puzzle-card';
        card.dataset.imgIdx = imgIdx;

        const img = document.createElement('img');
        img.src = PUZZLE_IMAGES[imgIdx];
        img.alt = '';
        img.onerror = () => card.classList.add('empty');
        card.appendChild(img);

        card.addEventListener('click', () => handleCardClick(card));
        wrap.appendChild(card);
      });
    }

    function handleCardClick(card) {
      if (puzzleSolved) return;

      if (!selectedCard) {
        selectedCard = card;
        card.classList.add('selected');
        return;
      }

      if (selectedCard === card) {
        card.classList.remove('selected');
        selectedCard = null;
        return;
      }

      // Swap in DOM
      const wrap = document.getElementById('puzzleWrap');
      const ph = document.createElement('div');
      wrap.insertBefore(ph, selectedCard);
      wrap.insertBefore(selectedCard, card);
      wrap.insertBefore(card, ph);
      wrap.removeChild(ph);

      selectedCard.classList.remove('selected');
      selectedCard = null;
      checkSolution();
    }

    function checkSolution() {
      const cards = [...document.getElementById('puzzleWrap').children];
      const current = cards.map(c => parseInt(c.dataset.imgIdx));
      if (current.join() === CORRECT_ORDER.join()) {
        puzzleSolved = true;
        cards.forEach((c, i) => setTimeout(() => c.classList.add('solved'), i * 130));
        setTimeout(() => document.getElementById('comingSoon').classList.add('visible'), 1700);
      }
    }
  </script>
