<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magus Jane</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blood: #8b0000;
      --ash: #1a1a1a;
      --bone: #c8b89a;
      --smoke: #2e2e2e;
      --flicker: #e8d5b0;
    }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
      mix-blend-mode: overlay;
    }

    canvas#chains {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    /* Hand logo */
    .sigil {
      width: 110px;
      height: 130px;
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: emerge 3s ease forwards 1s;
      filter: drop-shadow(0 0 14px rgba(139,0,0,0.5));
    }

    .title {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(3rem, 10vw, 7rem);
      color: var(--bone);
      letter-spacing: 0.05em;
      text-shadow:
        0 0 20px var(--blood),
        0 0 60px rgba(139,0,0,0.3),
        2px 2px 0 #000;
      opacity: 0;
      animation: emerge 3s ease forwards 1.8s, flicker 8s infinite 5s;
      line-height: 1;
    }

    .divider {
      width: 280px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blood), transparent);
      margin: 1.4rem auto;
      opacity: 0;
      animation: emerge 2s ease forwards 2.6s;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '✦';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--blood);
      font-size: 0.6rem;
    }
    .divider::before { left: -12px; }
    .divider::after { right: -12px; }

    /* Cycling subtitle */
    .subtitle-wrap {
      display: flex;
      align-items: baseline;
      gap: 0.4em;
      opacity: 0;
      animation: emerge 2s ease forwards 3s;
      height: 1.4em;
      overflow: visible;
    }

    .cycling-word {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.7rem, 2.2vw, 0.95rem);
      color: var(--blood);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      display: inline-block;
      min-width: 8em;
      text-align: right;
      transition: opacity 0.4s ease, transform 0.4s ease;
      text-shadow: 0 0 10px rgba(139,0,0,0.6);
    }

    .cycling-word.fade-out {
      opacity: 0;
      transform: translateY(-6px);
    }

    .cycling-word.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    .solutions-word {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.7rem, 2.2vw, 0.95rem);
      color: var(--bone);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(200,184,154,0.4);
    }

    .transmission {
      margin-top: 2.8rem;
      font-size: 0.65rem;
      color: #444;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0;
      animation: emerge 2s ease forwards 4.5s, pulse-text 4s infinite 6s;
    }

    .transmission span {
      color: var(--blood);
      animation: blink 1.4s step-end infinite 5s;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 30%,
        rgba(0,0,0,0.6) 70%,
        rgba(0,0,0,0.95) 100%);
      pointer-events: none;
      z-index: 5;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 6;
    }

    @keyframes emerge {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.4; }
      97% { opacity: 1; }
      98% { opacity: 0.2; }
      99% { opacity: 0.9; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes pulse-text {
      0%, 100% { color: #444; }
      50% { color: #666; }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <canvas id="chains"></canvas>
  <div class="vignette"></div>
  <div class="scanlines"></div>

  <div class="stage">

    <!-- Hand logo with hex cutout -->
    <svg class="sigil" viewBox="0 0 110 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Hexagon cutout mask -->
        <mask id="handMask">
          <!-- White = show, black = cut out -->
          <rect width="110" height="130" fill="white"/>
          <!-- Hexagon hole in palm -->
          <polygon points="55,52 63,57 63,67 55,72 47,67 47,57" fill="black"/>
        </mask>
      </defs>

      <!-- Hand silhouette (white, masked) -->
      <!-- Palm base -->
      <rect x="28" y="60" width="54" height="44" rx="8" fill="white" mask="url(#handMask)"/>
      <!-- Thumb -->
      <rect x="16" y="68" width="18" height="26" rx="9" fill="white"/>
      <!-- Index finger -->
      <rect x="30" y="22" width="14" height="46" rx="7" fill="white" mask="url(#handMask)"/>
      <!-- Middle finger -->
      <rect x="47" y="16" width="14" height="50" rx="7" fill="white" mask="url(#handMask)"/>
      <!-- Ring finger -->
      <rect x="64" y="22" width="13" height="46" rx="7" fill="white" mask="url(#handMask)"/>
      <!-- Pinky -->
      <rect x="79" y="32" width="11" height="38" rx="6" fill="white" mask="url(#handMask)"/>

      <!-- Hexagon outline (subtle) -->
      <polygon points="55,52 63,57 63,67 55,72 47,67 47,57"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

      <!-- Red lowercase j in hex center -->
      <text x="55" y="69"
        font-family="Georgia, serif"
        font-size="14"
        font-style="italic"
        fill="#8b0000"
        text-anchor="middle"
        dominant-baseline="auto">j</text>
    </svg>

    <h1 class="title">Magus Jane</h1>
    <div class="divider"></div>

    <div class="subtitle-wrap">
      <span class="cycling-word fade-in" id="cycler"></span>
      <span class="solutions-word">Solutions</span>
    </div>

    <p class="transmission">Transmission incoming <span>▮</span></p>
  </div>

  <script>
    // Cycling words — ends with empty string (drops off)
    const words = ['Digital', 'Gaming', 'Website', 'AI', 'Creative', 'Automation', ''];
    let index = 0;
    const cycler = document.getElementById('cycler');

    function nextWord() {
      cycler.classList.remove('fade-in');
      cycler.classList.add('fade-out');

      setTimeout(() => {
        index = (index + 1) % words.length;
        cycler.textContent = words[index];
        cycler.classList.remove('fade-out');
        cycler.classList.add('fade-in');

        // If we've landed on the final empty state, stop cycling
        if (words[index] === '') {
          cycler.style.minWidth = '0';
          return;
        }

        setTimeout(nextWord, 1800);
      }, 400);
    }

    // Start cycling after page has settled
    setTimeout(() => {
      cycler.textContent = words[0];
      setTimeout(nextWord, 1800);
    }, 5000);

    // Broken chains animation
    const canvas = document.getElementById('chains');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class ChainLink {
      constructor(x, y, angle, broken) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.broken = broken;
        this.vx = (Math.random() - 0.5) * (broken ? 1.2 : 0.1);
        this.vy = (Math.random() - 0.5) * (broken ? 1.2 : 0.1) + (broken ? 0.4 : 0.05);
        this.va = (Math.random() - 0.5) * (broken ? 0.04 : 0.002);
        this.opacity = broken ? Math.random() * 0.4 + 0.1 : Math.random() * 0.15 + 0.05;
        this.size = Math.random() * 10 + 8;
        this.fadeRate = broken ? Math.random() * 0.002 + 0.001 : 0;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.globalAlpha = Math.max(0, this.opacity);
        ctx.strokeStyle = this.broken ? '#8b0000' : '#3a3028';
        ctx.lineWidth = this.broken ? 1.5 : 1;
        ctx.beginPath();
        ctx.ellipse(0, 0, this.size * 0.4, this.size * 0.7, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-this.size * 0.4, 0);
        ctx.lineTo(this.size * 0.4, 0);
        ctx.stroke();
        if (this.broken) {
          ctx.strokeStyle = '#c8b89a';
          ctx.lineWidth = 0.5;
          ctx.globalAlpha = this.opacity * 0.6;
          ctx.beginPath();
          ctx.moveTo(-2, -this.size * 0.5);
          ctx.lineTo(2, this.size * 0.5);
          ctx.stroke();
        }
        ctx.restore();
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.angle += this.va;
        if (this.broken) {
          this.opacity -= this.fadeRate;
          this.vy += 0.008;
        }
      }

      isDead() {
        return this.opacity <= 0 ||
          this.x < -100 || this.x > canvas.width + 100 ||
          this.y > canvas.height + 100;
      }
    }

    let links = [];
    let frame = 0;

    function spawnAmbient() {
      links.push(new ChainLink(
        Math.random() * canvas.width,
        Math.random() * canvas.height,
        Math.random() * Math.PI,
        false
      ));
    }

    function spawnBurst(x, y) {
      for (let i = 0; i < 18; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 60;
        links.push(new ChainLink(
          x + Math.cos(angle) * dist,
          y + Math.sin(angle) * dist,
          angle, true
        ));
      }
    }

    for (let i = 0; i < 80; i++) spawnAmbient();

    canvas.addEventListener('click', (e) => spawnBurst(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      spawnBurst(e.touches[0].clientX, e.touches[0].clientY);
    });

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(10,10,10,0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      links = links.filter(l => !l.isDead());
      links.forEach(l => { l.update(); l.draw(); });

      if (frame % 12 === 0 && links.filter(l => !l.broken).length < 80) spawnAmbient();
      if (frame % 480 === 240) {
        spawnBurst(Math.random() * canvas.width, Math.random() * canvas.height);
      }

      frame++;
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
