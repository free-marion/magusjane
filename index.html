<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magus Jane</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Share+Tech+Mono&family=IM+Fell+English:ital@0;1&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050505;
      width: 100vw; height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* MATRIX CANVAS */
    #matrix {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Vignette */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 20%,
        rgba(5,5,5,0.5) 60%,
        rgba(5,5,5,0.92) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* BOOK SCENE */
    .scene {
      perspective: 1400px;
      z-index: 10;
      position: relative;
    }

    /* Floating wrapper ŌĆö keeps flip and float separate */
    .book-float {
      animation: float 5s ease-in-out infinite;
    }

    .book {
      width: 260px;
      height: 360px;
      transform-style: preserve-3d;
      transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1.000);
      cursor: pointer;
      position: relative;
    }

    .book.open {
      transform: rotateY(-180deg);
      cursor: default;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px) rotateX(6deg) rotateY(-10deg);
        filter: drop-shadow(0 40px 30px rgba(0,0,0,0.9)) drop-shadow(0 0 30px rgba(139,0,0,0.15));
      }
      50% {
        transform: translateY(-22px) rotateX(3deg) rotateY(-6deg);
        filter: drop-shadow(0 60px 40px rgba(0,0,0,0.8)) drop-shadow(0 0 40px rgba(139,0,0,0.25));
      }
    }

    .book-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* FRONT COVER */
    .book-front {
      background:
        linear-gradient(160deg, #1c0e07 0%, #2a1408 35%, #1a0c06 60%, #120804 100%);
      border-radius: 2px 6px 6px 2px;
      border: 1px solid rgba(180,140,70,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 2.2rem 2rem 2.8rem;
      position: relative;
      overflow: hidden;
      box-shadow:
        -12px 4px 25px rgba(0,0,0,0.9),
        inset -4px 0 12px rgba(0,0,0,0.6),
        inset 0 0 60px rgba(0,0,0,0.4);
    }

    /* Spine */
    .book-front::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 22px;
      background: linear-gradient(90deg, #0a0503, #1c0e07, #150a05);
      border-right: 1px solid rgba(180,140,70,0.12);
    }

    /* Inner border frame */
    .cover-frame {
      position: absolute;
      inset: 14px 14px 14px 26px;
      border: 1px solid rgba(180,140,70,0.15);
      pointer-events: none;
    }

    /* Corner ornaments */
    .cover-frame::before, .cover-frame::after {
      content: 'Ō£”';
      position: absolute;
      color: rgba(180,140,70,0.3);
      font-size: 0.5rem;
    }
    .cover-frame::before { top: -5px; left: -5px; }
    .cover-frame::after  { bottom: -5px; right: -5px; }

    .cover-title {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: 1.6rem;
      color: rgba(200,170,100,0.85);
      text-shadow: 0 0 12px rgba(200,170,100,0.2), 0 2px 4px rgba(0,0,0,0.8);
      letter-spacing: 0.04em;
      margin-bottom: 1.8rem;
      position: relative;
      z-index: 1;
    }

    .cover-logo {
      width: 110px;
      height: 130px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 8px rgba(139,0,0,0.4));
    }

    .cover-hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.45rem;
      color: rgba(180,140,70,0.3);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-top: 1.8rem;
      position: relative;
      z-index: 1;
      animation: pulse-hint 3s ease-in-out infinite;
    }

    @keyframes pulse-hint {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    /* INNER PAGE */
    .book-back {
      transform: rotateY(180deg);
      border-radius: 2px 6px 6px 2px;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 28px,
          rgba(150,100,50,0.06) 28px,
          rgba(150,100,50,0.06) 29px
        ),
        linear-gradient(160deg, #f0ddb5, #e8d09a, #dfc48a, #e8d09a);
      box-shadow:
        inset 0 0 60px rgba(100,60,10,0.25),
        inset -4px 0 12px rgba(100,60,10,0.15),
        -8px 4px 20px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .book-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      opacity: 0.6;
      pointer-events: none;
    }

    .page-ornament {
      font-size: 1.2rem;
      color: rgba(80,40,10,0.4);
      margin-bottom: 0.8rem;
      letter-spacing: 0.5em;
    }

    .inner-title {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1.25rem;
      color: #3d1f0a;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .inner-rule {
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(100,60,10,0.4), transparent);
      margin-bottom: 2rem;
    }

    .pwd-input {
      background: rgba(100,60,10,0.08);
      border: none;
      border-bottom: 1px solid rgba(80,40,10,0.4);
      padding: 0.5rem 1rem;
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: 1.4rem;
      color: #3d1f0a;
      text-align: center;
      width: 100%;
      margin-bottom: 1.4rem;
      outline: none;
      background: transparent;
      letter-spacing: 0.2em;
      position: relative;
      z-index: 1;
    }

    .pwd-input::placeholder { color: rgba(80,40,10,0.25); font-size: 1rem; }
    .pwd-input:focus { border-bottom-color: #8b0000; }

    .enter-btn {
      background: #3d1f0a;
      color: #f0ddb5;
      border: none;
      padding: 0.55rem 2.2rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
      z-index: 1;
    }

    .enter-btn:hover { background: #8b0000; }

    .pwd-error {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.8rem;
      color: #8b0000;
      margin-top: 1rem;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 0.3s;
      position: relative;
      z-index: 1;
    }

    .pwd-error.visible { opacity: 1; }

    /* COMING SOON OVERLAY */
    #coming-soon {
      position: fixed;
      inset: 0;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease;
    }

    #coming-soon.visible {
      opacity: 1;
      pointer-events: all;
    }

    .cs-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #8b0000;
      margin-bottom: 1.2rem;
      opacity: 0;
      transition: opacity 1s ease 1s;
    }

    #coming-soon.visible .cs-eyebrow { opacity: 1; }

    .cs-title {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(2.5rem, 9vw, 6rem);
      color: #c8b89a;
      text-shadow:
        0 0 30px rgba(139,0,0,0.3),
        0 0 80px rgba(139,0,0,0.1),
        2px 2px 0 #000;
      line-height: 1;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.2s ease 0.5s, transform 1.2s ease 0.5s;
    }

    #coming-soon.visible .cs-title {
      opacity: 1;
      transform: translateY(0);
    }

    .cs-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(200,184,154,0.4);
      margin-top: 1rem;
      opacity: 0;
      transition: opacity 1s ease 1.5s;
    }

    #coming-soon.visible .cs-sub { opacity: 1; }

    .cs-rule {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #8b0000, transparent);
      margin: 1.2rem auto;
      opacity: 0;
      transition: opacity 1s ease 1.2s;
    }

    #coming-soon.visible .cs-rule { opacity: 1; }
  </style>
</head>
<body>

  <canvas id="matrix"></canvas>
  <div class="vignette"></div>

  <!-- BOOK -->
  <div class="scene">
    <div class="book-float">
      <div class="book" id="book">

        <!-- FRONT COVER -->
        <div class="book-face book-front" onclick="openBook()">
          <div class="cover-frame"></div>
          <div class="cover-title">Magus Jane</div>

          <!-- Hand logo -->
          <svg class="cover-logo" viewBox="0 0 110 130" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <mask id="handMask">
                <rect width="110" height="130" fill="white"/>
                <polygon points="55,54 64,59 64,70 55,75 46,70 46,59" fill="black"/>
              </mask>
            </defs>
            <rect x="28" y="62" width="54" height="44" rx="8" fill="rgba(200,180,150,0.9)" mask="url(#handMask)"/>
            <rect x="15" y="70" width="19" height="27" rx="9" fill="rgba(200,180,150,0.9)"/>
            <rect x="30" y="22" width="14" height="48" rx="7" fill="rgba(200,180,150,0.9)" mask="url(#handMask)"/>
            <rect x="47" y="16" width="14" height="52" rx="7" fill="rgba(200,180,150,0.9)" mask="url(#handMask)"/>
            <rect x="64" y="23" width="13" height="47" rx="7" fill="rgba(200,180,150,0.9)" mask="url(#handMask)"/>
            <rect x="79" y="33" width="11" height="39" rx="6" fill="rgba(200,180,150,0.9)" mask="url(#handMask)"/>
            <polygon points="55,54 64,59 64,70 55,75 46,70 46,59"
              fill="none" stroke="rgba(200,180,150,0.25)" stroke-width="0.8"/>
            <text x="55" y="71"
              font-family="Georgia, serif"
              font-size="13"
              font-style="italic"
              fill="#8b0000"
              text-anchor="middle">j</text>
          </svg>

          <div class="cover-hint">Open the Book</div>
        </div>

        <!-- INNER PAGE -->
        <div class="book-face book-back">
          <div class="page-ornament">ŌĆö Ō£” ŌĆö</div>
          <div class="inner-title">
            Speak, Friend,<br>and Enter
          </div>
          <div class="inner-rule"></div>
          <input
            class="pwd-input"
            type="password"
            id="pwd"
            placeholder="┬Ę ┬Ę ┬Ę ┬Ę ┬Ę ┬Ę"
            onkeydown="handleKey(event)"
            autocomplete="off"
          />
          <button class="enter-btn" onclick="checkPwd()">Enter</button>
          <div class="pwd-error" id="pwd-error">The door remains closed.</div>
        </div>

      </div>
    </div>
  </div>

  <!-- COMING SOON -->
  <div id="coming-soon">
    <p class="cs-eyebrow">You may pass</p>
    <h1 class="cs-title">Magus Jane Solutions</h1>
    <div class="cs-rule"></div>
    <p class="cs-sub">Coming Soon</p>
  </div>

  <script>
    // ŌöĆŌöĆ MATRIX RAIN ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    // Tolkien-language characters: Runic (Cirth) + Elder Futhark
    const tolkienChars =
      'ßÜĀßÜóßÜ”ßÜ©ßÜ▒ßÜ▓ßÜĘßÜ╣ßÜ║ßÜŠßøüßøāßøćßøłßøēßøŖßøÅßøÆßø¢ßøŚßøÜßø£ßø×ßø¤ßÜ½ßÜ®ßÜ¬ßøØßøĪßøźßÜ┤ßøößøĢßÜĄßÜČßÜ│ßÜ╗ßÜ╝ßÜĮßÜ┐ßøĆßøéßøäßøģßøåßøŗßøīßøŹßøÄßøÉßøæßøōßÜĪßÜŻßÜżßÜźßÜ¦ßÜŁßÜ«ßÜ»ßÜ░ßøżßø”ßø¦ßø©ßø®ßø¬';

    let W, H, drops, fontSize = 18;

    function initMatrix() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      const cols = Math.floor(W / fontSize);
      drops = Array.from({ length: cols }, () => Math.random() * -(H / fontSize));
    }

    initMatrix();
    window.addEventListener('resize', initMatrix);

    function drawMatrix() {
      // Fade trail
      ctx.fillStyle = 'rgba(5,5,5,0.045)';
      ctx.fillRect(0, 0, W, H);

      drops.forEach((y, i) => {
        const char = tolkienChars[Math.floor(Math.random() * tolkienChars.length)];
        const x = i * fontSize;
        const yPx = y * fontSize;

        // Occasional bright amber "head" character
        const isHead = Math.random() > 0.96;
        if (isHead) {
          ctx.fillStyle = 'rgba(210,175,90,0.7)';
        } else {
          const fade = Math.random() * 0.18 + 0.02;
          ctx.fillStyle = `rgba(120,0,0,${fade})`;
        }

        ctx.font = `${fontSize}px serif`;
        ctx.fillText(char, x, yPx);

        // Reset drop
        if (yPx > H && Math.random() > 0.978) drops[i] = 0;
        drops[i] += Math.random() * 0.4 + 0.3;
      });
    }

    const matrixInterval = setInterval(drawMatrix, 45);

    // ŌöĆŌöĆ BOOK INTERACTION ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    let isOpen = false;

    function openBook() {
      if (isOpen) return;
      isOpen = true;
      const book = document.getElementById('book');
      book.classList.add('open');
      // Focus password field after flip completes
      setTimeout(() => {
        document.getElementById('pwd').focus();
      }, 1600);
    }

    function handleKey(e) {
      if (e.key === 'Enter') checkPwd();
    }

    function checkPwd() {
      const val = document.getElementById('pwd').value.toLowerCase().trim();
      if (val === 'mellon' || val === 'melon') {
        // Correct ŌĆö dissolve to coming soon
        document.getElementById('pwd').disabled = true;
        clearInterval(matrixInterval);
        setTimeout(() => {
          document.getElementById('coming-soon').classList.add('visible');
        }, 400);
      } else {
        // Wrong
        const err = document.getElementById('pwd-error');
        document.getElementById('pwd').value = '';
        err.classList.add('visible');
        // Shake input
        const input = document.getElementById('pwd');
        input.style.transition = 'transform 0.08s';
        input.style.transform = 'translateX(-6px)';
        setTimeout(() => { input.style.transform = 'translateX(6px)'; }, 80);
        setTimeout(() => { input.style.transform = 'translateX(0)'; }, 160);
        setTimeout(() => err.classList.remove('visible'), 2500);
      }
    }
  </script>

</body>
</html>
