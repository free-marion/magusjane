<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magus Jane</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Share+Tech+Mono&family=IM+Fell+English:ital@0;1&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #030303;
      width: 100vw; height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #matrix {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 15%,
        rgba(3,3,3,0.4) 55%,
        rgba(3,3,3,0.88) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* SCENE */
    .scene {
      perspective: 1400px;
      z-index: 10;
      position: relative;
    }

    /* Book — stationary, slight static tilt for dimension */
    .book {
      width: 260px;
      height: 360px;
      transform-style: preserve-3d;
      transform: rotateX(4deg) rotateY(-6deg);
      transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1.000);
      cursor: pointer;
      position: relative;
      filter:
        drop-shadow(0 60px 50px rgba(0,0,0,0.95))
        drop-shadow(0 0 50px rgba(100,0,0,0.15));
    }

    .book.open {
      transform: rotateX(4deg) rotateY(-186deg);
      cursor: default;
    }

    .book-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* FRONT COVER */
    .book-front {
      background: linear-gradient(160deg, #1c0e07 0%, #2a1408 35%, #1a0c06 60%, #120804 100%);
      border-radius: 2px 6px 6px 2px;
      border: 1px solid rgba(180,140,70,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 2.2rem 2rem 2.8rem;
      position: relative;
      overflow: hidden;
      box-shadow:
        -14px 6px 28px rgba(0,0,0,0.95),
        inset -4px 0 14px rgba(0,0,0,0.7),
        inset 0 0 80px rgba(0,0,0,0.5);
    }

    /* Spine */
    .book-front::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 22px;
      background: linear-gradient(90deg, #080402, #1c0e07, #150a05);
      border-right: 1px solid rgba(180,140,70,0.1);
    }

    .cover-frame {
      position: absolute;
      inset: 14px 14px 14px 26px;
      border: 1px solid rgba(180,140,70,0.12);
      pointer-events: none;
    }

    .cover-frame::before, .cover-frame::after {
      content: '✦';
      position: absolute;
      color: rgba(180,140,70,0.25);
      font-size: 0.5rem;
    }
    .cover-frame::before { top: -5px; left: -5px; }
    .cover-frame::after  { bottom: -5px; right: -5px; }

    .cover-title {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: 1.5rem;
      color: rgba(200,170,100,0.8);
      text-shadow: 0 0 12px rgba(200,170,100,0.15), 0 2px 4px rgba(0,0,0,0.9);
      letter-spacing: 0.04em;
      margin-bottom: 1.6rem;
      position: relative;
      z-index: 1;
    }

    .cover-logo {
      width: 110px;
      height: 130px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 10px rgba(100,0,0,0.5));
    }

    .cover-hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.42rem;
      color: rgba(180,140,70,0.28);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-top: 1.6rem;
      position: relative;
      z-index: 1;
      animation: pulse-hint 3s ease-in-out infinite;
    }

    @keyframes pulse-hint {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1;   }
    }

    /* INNER PAGE */
    .book-back {
      transform: rotateY(180deg);
      border-radius: 2px 6px 6px 2px;
      background:
        repeating-linear-gradient(
          0deg,
          transparent, transparent 27px,
          rgba(130,80,30,0.07) 27px, rgba(130,80,30,0.07) 28px
        ),
        linear-gradient(160deg, #f0ddb5, #e8d09a, #dfc48a, #e8d09a);
      box-shadow:
        inset 0 0 60px rgba(100,60,10,0.2),
        inset -4px 0 12px rgba(100,60,10,0.12),
        -8px 4px 20px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .book-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
      opacity: 0.7;
      pointer-events: none;
    }

    .page-ornament {
      font-size: 1.1rem;
      color: rgba(80,40,10,0.35);
      margin-bottom: 0.8rem;
      letter-spacing: 0.4em;
      position: relative;
      z-index: 1;
    }

    .inner-title {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: #3d1f0a;
      text-align: center;
      line-height: 1.55;
      margin-bottom: 1.8rem;
      position: relative;
      z-index: 1;
    }

    .inner-rule {
      width: 75%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(100,60,10,0.35), transparent);
      margin-bottom: 1.8rem;
    }

    .pwd-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(80,40,10,0.35);
      padding: 0.5rem 1rem;
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: 1.4rem;
      color: #3d1f0a;
      text-align: center;
      width: 100%;
      margin-bottom: 1.4rem;
      outline: none;
      letter-spacing: 0.2em;
      position: relative;
      z-index: 1;
    }

    .pwd-input::placeholder { color: rgba(80,40,10,0.22); font-size: 1rem; }
    .pwd-input:focus { border-bottom-color: #8b0000; }

    .enter-btn {
      background: #3d1f0a;
      color: #f0ddb5;
      border: none;
      padding: 0.55rem 2.2rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
      z-index: 1;
    }
    .enter-btn:hover { background: #8b0000; }

    .pwd-error {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.8rem;
      color: #8b0000;
      margin-top: 1rem;
      opacity: 0;
      transition: opacity 0.3s;
      position: relative;
      z-index: 1;
    }
    .pwd-error.visible { opacity: 1; }

    /* COMING SOON */
    #coming-soon {
      position: fixed;
      inset: 0;
      background: #030303;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease;
    }
    #coming-soon.visible { opacity: 1; pointer-events: all; }

    .cs-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #8b0000;
      margin-bottom: 1.2rem;
      opacity: 0;
      transition: opacity 1s ease 1s;
    }
    #coming-soon.visible .cs-eyebrow { opacity: 1; }

    .cs-title {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(2.5rem, 9vw, 6rem);
      color: #c8b89a;
      text-shadow: 0 0 30px rgba(139,0,0,0.3), 0 0 80px rgba(139,0,0,0.1), 2px 2px 0 #000;
      line-height: 1;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.2s ease 0.5s, transform 1.2s ease 0.5s;
    }
    #coming-soon.visible .cs-title { opacity: 1; transform: translateY(0); }

    .cs-rule {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #8b0000, transparent);
      margin: 1.2rem auto;
      opacity: 0;
      transition: opacity 1s ease 1.2s;
    }
    #coming-soon.visible .cs-rule { opacity: 1; }

    .cs-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(200,184,154,0.35);
      opacity: 0;
      transition: opacity 1s ease 1.5s;
    }
    #coming-soon.visible .cs-sub { opacity: 1; }
  </style>
</head>
<body>

  <canvas id="matrix"></canvas>
  <div class="vignette"></div>

  <div class="scene">
    <div class="book" id="book">

      <div class="book-face book-front" onclick="openBook()">
        <div class="cover-frame"></div>
        <div class="cover-title">Magus Jane</div>
        <svg class="cover-logo" viewBox="0 0 110 130" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <mask id="hm">
              <rect width="110" height="130" fill="white"/>
              <polygon points="55,54 64,59 64,70 55,75 46,70 46,59" fill="black"/>
            </mask>
          </defs>
          <rect x="28" y="62" width="54" height="44" rx="8" fill="rgba(200,180,150,0.9)" mask="url(#hm)"/>
          <rect x="15" y="70" width="19" height="27" rx="9" fill="rgba(200,180,150,0.9)"/>
          <rect x="30" y="22" width="14" height="48" rx="7" fill="rgba(200,180,150,0.9)" mask="url(#hm)"/>
          <rect x="47" y="16" width="14" height="52" rx="7" fill="rgba(200,180,150,0.9)" mask="url(#hm)"/>
          <rect x="64" y="23" width="13" height="47" rx="7" fill="rgba(200,180,150,0.9)" mask="url(#hm)"/>
          <rect x="79" y="33" width="11" height="39" rx="6" fill="rgba(200,180,150,0.9)" mask="url(#hm)"/>
          <polygon points="55,54 64,59 64,70 55,75 46,70 46,59" fill="none" stroke="rgba(200,180,150,0.2)" stroke-width="0.8"/>
          <text x="55" y="71" font-family="Georgia,serif" font-size="13" font-style="italic" fill="#8b0000" text-anchor="middle">j</text>
        </svg>
        <div class="cover-hint">Open the Book</div>
      </div>

      <div class="book-face book-back">
        <div class="page-ornament">— ✦ —</div>
        <div class="inner-title">Speak, Friend,<br>and Enter</div>
        <div class="inner-rule"></div>
        <input class="pwd-input" type="password" id="pwd" placeholder="· · · · · ·" onkeydown="handleKey(event)" autocomplete="off"/>
        <button class="enter-btn" onclick="checkPwd()">Enter</button>
        <div class="pwd-error" id="pwd-error">The door remains closed.</div>
      </div>

    </div>
  </div>

  <div id="coming-soon">
    <p class="cs-eyebrow">You may pass</p>
    <h1 class="cs-title">Magus Jane Solutions</h1>
    <div class="cs-rule"></div>
    <p class="cs-sub">Coming Soon</p>
  </div>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx    = canvas.getContext('2d');

    // ── CHARACTER SETS ───────────────────────────────────────────
    // Cirth (Tolkien's runic script — actual Runic Unicode block)
    const CIRTH = 'ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛊᛏᛒᛖᛗᛚᛜᛞᛟᚫᚩᚪᛝᛡᛥᚴᛔᛕ';

    // Tengwar approximation — Sinhala script has near-identical bow+stem structure
    const TENGWAR = 'කඛගඝඤජඣญटठडढෆලවශෂසහළඅආඇඈඉඊඋඌඑඒඓඔඕ';

    // Black Speech — the One Ring inscription broken into tokens
    const BLACK_SPEECH_TOKENS = [
      'ash','nazg','durb','ulûk','gimb','atul',
      'thraka','agh','burzum','ishi','krimp','û','k'
    ];

    // One Ring inscription for the horizontal band
    const RING_INSCRIPTION =
      '  ash nazg durbatulûk · ash nazg gimbatul · ash nazg thrakatulûk agh burzum-ishi krimpatul  ';

    // ── COLUMN TYPES ─────────────────────────────────────────────
    const TYPE_CIRTH      = 0; // crimson,     fast
    const TYPE_TENGWAR    = 1; // amber,        slow
    const TYPE_BLACKSPEECH= 2; // sickly green, erratic

    // ── STATE ────────────────────────────────────────────────────
    let W, H, cols, columns = [], frame = 0;
    let ringX = 0; // scrolling inscription offset

    function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

    function initCols() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;

      const baseFontSize = 16;
      const colCount     = Math.floor(W / baseFontSize);
      columns = [];

      for (let i = 0; i < colCount; i++) {
        // Assign type: 50% Cirth, 30% Tengwar, 20% Black Speech
        const r = Math.random();
        const type = r < 0.50 ? TYPE_CIRTH
                   : r < 0.80 ? TYPE_TENGWAR
                   :             TYPE_BLACKSPEECH;

        // Depth layer: 0=far(small/dim), 1=mid, 2=near(large/bright)
        const dr = Math.random();
        const depth = dr < 0.40 ? 0 : dr < 0.80 ? 1 : 2;

        const sizeMultiplier = [0.55, 1.0, 1.55][depth];
        const fontSize       = Math.round(baseFontSize * sizeMultiplier);

        // Speed: Cirth fast, Tengwar slow, Black Speech erratic
        let speed;
        if (type === TYPE_CIRTH)       speed = Math.random() * 0.5 + 0.55;
        else if (type === TYPE_TENGWAR) speed = Math.random() * 0.2 + 0.15;
        else                           speed = Math.random() * 1.2 + 0.1; // erratic base

        columns.push({
          x: i * baseFontSize,
          y: Math.random() * -(H / fontSize) * 2, // stagger start
          type,
          depth,
          fontSize,
          speed,
          bsIndex: 0, // for black speech token cycling
          bsCharIdx: 0,
          bsCurrentWord: BLACK_SPEECH_TOKENS[0],
        });
      }

      ringX = W; // inscription starts off right edge
    }

    initCols();
    window.addEventListener('resize', initCols);

    // ── DRAW FRAME ───────────────────────────────────────────────
    function draw() {
      // Fade trail — heavier fade = shorter tail
      ctx.fillStyle = 'rgba(3,3,3,0.055)';
      ctx.fillRect(0, 0, W, H);

      // ── Book glow ──────────────────────────────────────────────
      const cx     = W / 2;
      const cy     = H / 2;
      const pulse  = 180 + Math.sin(frame * 0.018) * 40;
      const glow   = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse);
      glow.addColorStop(0,   'rgba(100,0,0,0.13)');
      glow.addColorStop(0.5, 'rgba(60,0,0,0.06)');
      glow.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);

      // ── Columns ───────────────────────────────────────────────
      columns.forEach(col => {
        let char;

        if (col.type === TYPE_CIRTH) {
          char = CIRTH[randInt(0, CIRTH.length - 1)];
        } else if (col.type === TYPE_TENGWAR) {
          char = TENGWAR[randInt(0, TENGWAR.length - 1)];
        } else {
          // Black Speech: cycle through word characters
          const word = col.bsCurrentWord;
          char = word[col.bsCharIdx % word.length];
        }

        const yPx = col.y * col.fontSize;

        // Base opacity scales with depth
        const baseOpacity = [0.07, 0.14, 0.28][col.depth];

        // Color per type
        let r, g, b, headColor;
        if (col.type === TYPE_CIRTH) {
          r = 139; g = 0;   b = 0;
          headColor = `rgba(220,160,80,0.8)`;
        } else if (col.type === TYPE_TENGWAR) {
          r = 170; g = 120; b = 20;
          headColor = `rgba(240,210,100,0.85)`;
        } else {
          r = 55;  g = 90;  b = 20;
          headColor = `rgba(120,180,40,0.7)`;
        }

        const isHead = Math.random() > 0.94;
        if (isHead) {
          ctx.fillStyle = headColor;
        } else {
          const o = baseOpacity + Math.random() * baseOpacity;
          ctx.fillStyle = `rgba(${r},${g},${b},${o})`;
        }

        ctx.font = `${col.fontSize}px serif`;
        ctx.fillText(char, col.x, yPx);

        // Advance position
        let step = col.speed;
        if (col.type === TYPE_BLACKSPEECH) {
          // Erratic — occasionally jump or pause
          if (Math.random() > 0.92) step *= (Math.random() * 3 + 0.1);
          if (Math.random() > 0.97) step = 0;
        }
        col.y += step;

        // Advance black speech character
        if (col.type === TYPE_BLACKSPEECH && frame % 8 === 0) {
          col.bsCharIdx++;
          if (col.bsCharIdx >= col.bsCurrentWord.length) {
            col.bsCharIdx = 0;
            col.bsIndex   = (col.bsIndex + 1) % BLACK_SPEECH_TOKENS.length;
            col.bsCurrentWord = BLACK_SPEECH_TOKENS[col.bsIndex];
          }
        }

        // Reset column when off screen
        if (yPx > H + 20 && Math.random() > 0.97) {
          col.y = -randInt(5, 30);
        }
      });

      // ── One Ring inscription horizontal band ──────────────────
      // Pulses into visibility every ~600 frames, fades out slowly
      const inscriptionCycle = frame % 600;
      let inscOpacity = 0;
      if (inscriptionCycle < 60)        inscOpacity = inscriptionCycle / 60 * 0.18;
      else if (inscriptionCycle < 300)  inscOpacity = 0.18;
      else if (inscriptionCycle < 420)  inscOpacity = (1 - (inscriptionCycle - 300) / 120) * 0.18;

      if (inscOpacity > 0.005) {
        ctx.save();
        ctx.globalAlpha = inscOpacity;
        ctx.font        = '13px "Share Tech Mono", monospace';
        ctx.fillStyle   = 'rgba(180,130,40,1)';

        // Repeat inscription to fill width
        const textWidth = ctx.measureText(RING_INSCRIPTION).width;
        const y = cy + 230;

        // Scroll slowly leftward
        const offset = (frame * 0.4) % textWidth;
        ctx.fillText(RING_INSCRIPTION, -offset, y);
        ctx.fillText(RING_INSCRIPTION, -offset + textWidth, y);
        ctx.restore();
      }

      frame++;
      requestAnimationFrame(draw);
    }

    draw();

    // ── BOOK ─────────────────────────────────────────────────────
    let isOpen = false;

    function openBook() {
      if (isOpen) return;
      isOpen = true;
      document.getElementById('book').classList.add('open');
      setTimeout(() => document.getElementById('pwd').focus(), 1600);
    }

    function handleKey(e) { if (e.key === 'Enter') checkPwd(); }

    function checkPwd() {
      const val = document.getElementById('pwd').value.toLowerCase().trim();
      if (val === 'mellon' || val === 'melon') {
        document.getElementById('pwd').disabled = true;
        setTimeout(() => document.getElementById('coming-soon').classList.add('visible'), 400);
      } else {
        const err   = document.getElementById('pwd-error');
        const input = document.getElementById('pwd');
        input.value = '';
        err.classList.add('visible');
        // Shake
        input.style.transition = 'transform 0.07s';
        ['-7px','7px','-4px','4px','0px'].forEach((x, i) => {
          setTimeout(() => input.style.transform = `translateX(${x})`, i * 70);
        });
        setTimeout(() => err.classList.remove('visible'), 2800);
      }
    }
  </script>

</body>
</html>
