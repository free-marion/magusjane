<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magus Jane</title>
  <link rel="preload" as="image" href="images/cover-nobg.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Share+Tech+Mono&family=IM+Fell+English:ital@0;1&family=Orbitron:wght@400;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #030303;
      width: 100vw; height: 100vh;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── MATRIX ─────────────────────────────────────────── */
    #matrix { position: fixed; inset: 0; z-index: 0; transition: opacity 2s ease; }

    .vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 15%, rgba(3,3,3,0.45) 55%, rgba(3,3,3,0.92) 100%);
      transition: opacity 2s ease;
    }

    #darkOverlay {
      position: fixed; inset: 0; z-index: 20; pointer-events: none;
      background: rgba(0,0,0,0); transition: background 1.2s ease;
    }
    #darkOverlay.active { background: rgba(0,0,0,0.82); }

    /* ── BOOK ───────────────────────────────────────────── */
    .scene {
      z-index: 10; position: relative; perspective: 1200px;
      display: flex; flex-direction: column; align-items: center;
    }

    #bookCover {
      width: min(300px, 70vw); height: auto;
      cursor: pointer; display: block;
      animation: levitate 4.5s ease-in-out infinite;
      filter:
        drop-shadow(-10px 6px 24px rgba(0,0,0,0.9))
        drop-shadow(0 30px 50px rgba(0,0,0,0.8))
        drop-shadow(0 0 60px rgba(90,0,0,0.22));
      transition: opacity 0.35s ease, filter 0.4s ease;
    }
    #bookCover:hover {
      filter:
        drop-shadow(-10px 6px 24px rgba(0,0,0,0.9))
        drop-shadow(0 30px 50px rgba(0,0,0,0.8))
        drop-shadow(0 0 90px rgba(130,0,0,0.4));
    }
    @keyframes levitate {
      0%,100% { transform: rotateX(5deg) rotateY(-8deg) translateY(0px); }
      50%      { transform: rotateX(5deg) rotateY(-8deg) translateY(-16px); }
    }
    #bookCover.opening {
      animation: none;
      transform: rotateX(12deg) rotateY(-40deg) scale(1.04);
      transition: transform 0.28s ease, opacity 0.25s ease 0.22s;
      opacity: 0;
    }

    .book-glow {
      position: absolute; bottom: -18px; width: 70%; height: 28px;
      background: radial-gradient(ellipse, rgba(100,0,0,0.45) 0%, transparent 70%);
      animation: glow-breathe 4.5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glow-breathe {
      0%,100% { opacity: 0.55; transform: scaleX(1); }
      50%      { opacity: 0.85; transform: scaleX(0.82); }
    }

    /* ── PARCHMENT ──────────────────────────────────────── */
    #pageReveal {
      position: fixed; inset: 0; z-index: 50;
      opacity: 0; pointer-events: none; transition: opacity 0.9s ease;
      background:
        repeating-linear-gradient(0deg,
          transparent, transparent 30px,
          rgba(120,75,20,0.055) 30px, rgba(120,75,20,0.055) 31px),
        linear-gradient(165deg, #f6e5bc 0%, #edd5a0 30%, #e6c98a 60%, #f0d9a8 100%);
    }
    #pageReveal::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.065'/%3E%3C/svg%3E");
    }
    #pageReveal::after {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 45%, rgba(90,50,8,0.1) 75%, rgba(70,35,5,0.28) 100%);
    }
    #pageReveal.open { opacity: 1; pointer-events: all; }

    #pageContent {
      position: absolute; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 2rem; gap: clamp(1rem, 3vh, 2rem);
    }

    .page-border {
      position: absolute; inset: clamp(14px, 3vw, 40px);
      border: 1px solid rgba(80,40,10,0.2); pointer-events: none;
    }
    .page-border::before { content:'✦'; position:absolute; top:-7px; left:-7px; color:rgba(80,40,10,0.35); font-size:0.65rem; }
    .page-border::after  { content:'✦'; position:absolute; bottom:-7px; right:-7px; color:rgba(80,40,10,0.35); font-size:0.65rem; }

    .page-ornament {
      font-family: 'IM Fell English', serif;
      font-size: clamp(0.55rem, 1.2vw, 0.85rem);
      color: rgba(80,40,10,0.38); letter-spacing: 0.6em;
    }

    /* Ink inscription — container for ink-reveal chars */
    .ink-inscription {
      font-family: 'IM Fell English', serif; font-style: italic;
      font-size: clamp(1.6rem, 5vw, 3.2rem);
      color: #2a1005; text-align: center; line-height: 1.45;
      filter: url(#inkBleed);
      text-shadow: 1px 1px 3px rgba(20,8,0,0.25);
    }

    .ink-rule {
      width: min(400px, 70vw); height: 1px;
      background: linear-gradient(90deg, transparent, rgba(80,40,10,0.4), transparent);
      position: relative;
    }
    .ink-rule::before {
      content: '⬥'; position: absolute; left: 50%; top: 50%;
      transform: translate(-50%,-50%); color: rgba(80,40,10,0.28); font-size: 0.5rem;
    }

    /* ── PASSWORD ───────────────────────────────────────── */
    .pwd-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 1.2rem; width: min(320px, 80vw);
    }

    .pwd-input {
      background: transparent; border: none;
      border-bottom: 1px solid rgba(60,30,5,0.45);
      padding: 0.6rem 0.5rem;
      font-family: 'IM Fell English', serif; font-style: italic;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      color: #2a1005; text-align: center; width: 100%;
      outline: none; letter-spacing: 0.25em; caret-color: #8b0000;
      filter: url(#inkBleed);
    }
    .pwd-input::placeholder { color: rgba(60,30,5,0.22); font-size: 1rem; letter-spacing: 0.4em; font-style: normal; }
    .pwd-input:focus { border-bottom-color: rgba(100,0,0,0.6); }

    .enter-btn {
      background: #2a1005; color: #f0ddb5; border: none;
      padding: 0.65rem 2.5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
      cursor: pointer; transition: background 0.25s;
    }
    .enter-btn:hover { background: #8b0000; }

    .pwd-error {
      font-family: 'IM Fell English', serif; font-style: italic;
      font-size: 0.9rem; color: #8b0000;
      opacity: 0; transition: opacity 0.35s; min-height: 1.2em;
    }
    .pwd-error.visible { opacity: 1; }

    /* ── WRONG SCREEN ───────────────────────────────────── */
    #wrongScreen {
      position: fixed; inset: 0; z-index: 100;
      background: #030303;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem; gap: 3rem;
      opacity: 0; pointer-events: none; transition: opacity 1.4s ease;
    }
    #wrongScreen.visible { opacity: 1; pointer-events: all; }

    .wrong-text {
      font-family: 'IM Fell English', serif; font-style: italic;
      font-size: clamp(1.4rem, 4vw, 2.6rem);
      color: #8b0000; text-align: center; line-height: 1.6;
      text-shadow: 0 0 40px rgba(139,0,0,0.35), 0 0 80px rgba(139,0,0,0.12);
    }

    .return-link {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.4em; text-transform: uppercase;
      color: rgba(200,180,160,0.25); background: none; border: none;
      cursor: pointer; transition: color 0.3s;
      opacity: 0; pointer-events: none;
    }
    .return-link.visible { opacity: 1; pointer-events: all; }
    .return-link:hover { color: rgba(200,180,160,0.65); }

    /* ── MAIN SITE ──────────────────────────────────────── */
    #mainSite {
      position: fixed; inset: 0; z-index: 100;
      background: #060606;
      opacity: 0; pointer-events: none; transition: opacity 1.8s ease;
    }
    #mainSite.visible { opacity: 1; pointer-events: all; }

    /* Wordmark — faint, top center */
    .site-wordmark {
      position: absolute; top: clamp(1.2rem, 3vh, 2.5rem);
      left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(0.8rem, 2vw, 1.4rem);
      color: rgba(200,178,138,0.28);
      letter-spacing: 0.2em; white-space: nowrap;
      pointer-events: none;
    }

    /* Full-screen constellation SVG */
    #constellationSvg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* Each floating icon node */
    .menu-node {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .menu-node .node-img {
      width: clamp(80px, 12vw, 140px);
      height: clamp(80px, 12vw, 140px);
      object-fit: contain;
      transition: transform 0.35s ease, filter 0.35s ease;
      filter: drop-shadow(0 0 8px rgba(0,0,0,0.6));
    }

    /* Running man is black — invert to pale gold on dark bg */
    .node-free-marion .node-img {
      filter: brightness(0) invert(0.88) sepia(0.25)
              drop-shadow(0 0 8px rgba(0,0,0,0.6));
    }

    .menu-node .node-label {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.48rem, 1vw, 0.62rem);
      letter-spacing: 0.35em; text-transform: uppercase;
      color: rgba(200,178,138,0.55);
      margin-top: 0.9rem;
      opacity: 0;
      transition: opacity 0.5s ease;
      white-space: nowrap;
    }

    /* Hover state */
    .menu-node:hover .node-img {
      transform: scale(1.1);
    }
    .menu-node:hover .node-label { opacity: 1; }

    /* Each node dims when a sibling is hovered */
    #siteMenu:hover .menu-node:not(:hover) .node-img {
      filter: brightness(0.4) drop-shadow(0 0 4px rgba(0,0,0,0.4));
    }
    #siteMenu:hover .node-free-marion:not(:hover) .node-img {
      filter: brightness(0) invert(0.5) sepia(0.1)
              drop-shadow(0 0 4px rgba(0,0,0,0.4));
    }

    /* Individual float animations — offset phases so they never sync */
    @keyframes float-a {
      0%,100% { transform: translate(-50%,-50%) translateY(0px); }
      50%      { transform: translate(-50%,-50%) translateY(-14px); }
    }
    @keyframes float-b {
      0%,100% { transform: translate(-50%,-50%) translateY(-6px); }
      50%      { transform: translate(-50%,-50%) translateY(10px); }
    }
    @keyframes float-c {
      0%,100% { transform: translate(-50%,-50%) translateY(-10px); }
      50%      { transform: translate(-50%,-50%) translateY(6px); }
    }
    .float-a { animation: float-a 5.2s ease-in-out infinite; }
    .float-b { animation: float-b 6.8s ease-in-out infinite 1.4s; }
    .float-c { animation: float-c 4.9s ease-in-out infinite 2.9s; }

    /* Constellation line pulse */
    @keyframes line-pulse {
      0%,100% { opacity: 0.07; }
      50%      { opacity: 0.14; }
    }
    .const-line { animation: line-pulse 8s ease-in-out infinite; }

    /* Glow on hover — per node colour */
    .node-the-lost:hover .node-img {
      filter: drop-shadow(0 0 22px rgba(80,160,80,0.55))
              drop-shadow(0 0 50px rgba(40,100,40,0.3));
    }
    .node-cherrywood:hover .node-img {
      filter: drop-shadow(0 0 22px rgba(180,150,40,0.6))
              drop-shadow(0 0 50px rgba(30,100,50,0.3));
    }
    .node-free-marion:hover .node-img {
      filter: brightness(0) invert(0.95) sepia(0.3)
              drop-shadow(0 0 22px rgba(200,180,130,0.65))
              drop-shadow(0 0 50px rgba(200,160,80,0.3));
    }

    #siteMenu {
      position: absolute; inset: 0;
    }

    /* ── FREE MARION OVERLAY ────────────────────────────── */
    #fmOverlay {
      position: fixed; inset: 0; z-index: 200;
      background: #00000f;
      opacity: 0; pointer-events: none;
      transition: opacity 1.2s ease;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
    }
    #fmOverlay.visible { opacity: 1; pointer-events: all; }

    /* Scanline texture */
    #fmOverlay::before {
      content: '';
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,240,255,0.018) 2px, rgba(0,240,255,0.018) 4px
      );
    }

    /* Giant running man — background figure */
    #fmRunner {
      position: absolute;
      right: -4vw; bottom: -2vh;
      height: 92vh; width: auto;
      opacity: 0.07;
      filter: brightness(0) invert(1) drop-shadow(0 0 60px rgba(0,240,255,0.4));
      pointer-events: none;
      z-index: 1;
    }

    /* Left panel — login */
    .fm-panel {
      position: absolute;
      left: clamp(3rem, 8vw, 9rem);
      top: 50%; transform: translateY(-50%);
      z-index: 2;
      display: flex; flex-direction: column;
      gap: 2.8rem;
    }

    .fm-wordmark {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      letter-spacing: 0.18em;
      color: #00f0ff;
      text-shadow: 0 0 30px rgba(0,240,255,0.5), 0 0 80px rgba(0,240,255,0.15);
      line-height: 1;
    }
    .fm-wordmark span {
      display: block;
      font-size: 0.32em;
      letter-spacing: 0.55em;
      color: rgba(0,240,255,0.35);
      margin-top: 0.5em;
      font-weight: 400;
    }

    /* Identity drum selector */
    .fm-drum-wrap {
      display: flex; flex-direction: column; align-items: flex-start;
      gap: 0.4rem;
    }
    .fm-drum-label {
      font-size: 0.5rem; letter-spacing: 0.55em; text-transform: uppercase;
      color: rgba(0,240,255,0.3);
    }
    .fm-drum {
      display: flex; align-items: center; gap: 0.8rem;
    }
    .fm-drum-viewport {
      width: clamp(160px, 22vw, 240px);
      height: 2.8rem;
      overflow: hidden;
      position: relative;
      perspective: 500px;
    }
    /* Stacked name strips — translated by JS */
    .fm-drum-strip {
      display: flex; flex-direction: column;
      transition: transform 0.38s cubic-bezier(0.25,1.4,0.5,1);
      transform-style: preserve-3d;
    }
    .fm-drum-item {
      height: 2.8rem;
      display: flex; align-items: center;
      font-size: clamp(1.1rem, 2.2vw, 1.6rem);
      font-weight: 700; letter-spacing: 0.22em;
      color: #00f0ff;
      text-shadow: 0 0 14px rgba(0,240,255,0.7);
      white-space: nowrap;
      transition: opacity 0.3s, transform 0.3s;
    }
    .fm-drum-item.active   { opacity: 1; }
    .fm-drum-item.adjacent { opacity: 0.22; transform: scaleY(0.72); }
    .fm-drum-item.far      { opacity: 0; }

    .fm-drum-arrow {
      background: none; border: none; cursor: pointer;
      color: rgba(0,240,255,0.4); font-size: 1rem; line-height: 1;
      padding: 0.3rem;
      transition: color 0.2s, text-shadow 0.2s;
    }
    .fm-drum-arrow:hover {
      color: #00f0ff;
      text-shadow: 0 0 10px rgba(0,240,255,0.8);
    }

    /* Glitch flash on cycle */
    @keyframes fm-glitch {
      0%   { clip-path: inset(40% 0 50% 0); transform: translateX(-4px); opacity:0.9; }
      25%  { clip-path: inset(10% 0 80% 0); transform: translateX(4px);  opacity:0.7; }
      50%  { clip-path: inset(70% 0 10% 0); transform: translateX(-2px); opacity:1; }
      75%  { clip-path: inset(20% 0 60% 0); transform: translateX(2px);  opacity:0.8; }
      100% { clip-path: inset(0 0 0 0);      transform: translateX(0);    opacity:1; }
    }
    .fm-drum-viewport.glitching .fm-drum-item.active {
      animation: fm-glitch 0.22s steps(1) forwards;
    }

    /* Cipher input */
    .fm-cipher-wrap {
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .fm-cipher-label {
      font-size: 0.5rem; letter-spacing: 0.55em; text-transform: uppercase;
      color: rgba(0,240,255,0.3);
    }
    .fm-cipher-track {
      display: flex; gap: 0.35rem; align-items: center;
    }
    .fm-cipher-digit {
      width: clamp(1.8rem, 3vw, 2.4rem);
      height: clamp(2.2rem, 3.5vw, 2.8rem);
      background: rgba(0,240,255,0.04);
      border: 1px solid rgba(0,240,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(0.9rem, 1.6vw, 1.3rem);
      font-weight: 700; letter-spacing: 0;
      color: #00f0ff;
      text-shadow: 0 0 8px rgba(0,240,255,0.7);
      transition: border-color 0.2s, background 0.2s;
    }
    .fm-cipher-digit.filled {
      border-color: rgba(0,240,255,0.55);
      background: rgba(0,240,255,0.08);
    }
    .fm-cipher-digit.active-digit {
      border-color: #00f0ff;
      background: rgba(0,240,255,0.12);
      box-shadow: 0 0 12px rgba(0,240,255,0.3);
    }
    /* Hidden real input */
    #fmCipherInput {
      position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0;
    }

    /* Authenticate button */
    .fm-auth-btn {
      background: transparent;
      border: 1px solid rgba(0,240,255,0.25);
      padding: 0.7rem 0;
      width: clamp(160px, 22vw, 240px);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.55em; text-transform: uppercase;
      color: rgba(0,240,255,0.4);
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
      position: relative; overflow: hidden;
    }
    .fm-auth-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0,240,255,0.06), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .fm-auth-btn:hover::before { transform: translateX(100%); }
    .fm-auth-btn:hover {
      border-color: rgba(0,240,255,0.6);
      color: #00f0ff;
      box-shadow: 0 0 20px rgba(0,240,255,0.15);
    }

    .fm-back {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.42rem; letter-spacing: 0.45em; text-transform: uppercase;
      color: rgba(0,240,255,0.15); background: none; border: none;
      cursor: pointer; transition: color 0.3s; margin-top: -1rem;
    }
    .fm-back:hover { color: rgba(0,240,255,0.4); }

    /* Corner HUD decorations */
    .fm-hud {
      position: absolute; z-index: 2; pointer-events: none;
      border-color: rgba(0,240,255,0.12); border-style: solid;
    }
    .fm-hud.tl { top:1.6rem; left:1.6rem; width:3.5rem; height:3.5rem; border-width:1px 0 0 1px; }
    .fm-hud.tr { top:1.6rem; right:1.6rem; width:3.5rem; height:3.5rem; border-width:1px 1px 0 0; }
    .fm-hud.bl { bottom:1.6rem; left:1.6rem; width:3.5rem; height:3.5rem; border-width:0 0 1px 1px; }
    .fm-hud.br { bottom:1.6rem; right:1.6rem; width:3.5rem; height:3.5rem; border-width:0 1px 1px 0; }
  </style>
</head>
<body>

  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="inkBleed" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04 0.04" numOctaves="3" result="noise" seed="7"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G" result="d"/>
        <feGaussianBlur in="d" stdDeviation="0.25"/>
      </filter>
    </defs>
  </svg>

  <canvas id="matrix"></canvas>
  <div class="vignette" id="vignette"></div>
  <div id="darkOverlay"></div>

  <!-- ── BOOK ──────────────────────────────────────────── -->
  <div class="scene">
    <img id="bookCover" src="images/cover-nobg.png" alt="" onclick="openBook()" />
    <div class="book-glow"></div>
  </div>

  <!-- ── PARCHMENT PAGE ─────────────────────────────────── -->
  <div id="pageReveal">
    <div id="pageContent">
      <div class="page-border"></div>
      <div class="page-ornament">— ✦ ✦ ✦ —</div>
      <div class="ink-inscription" id="inscription"></div>
      <div class="ink-rule"></div>
      <div class="pwd-wrap">
        <input class="pwd-input" type="password" id="pwd"
               placeholder="· · · · · ·" onkeydown="handleKey(event)" autocomplete="off"/>
        <button class="enter-btn" onclick="checkPwd()">Enter</button>
        <div class="pwd-error" id="pwdError">The door remains closed.</div>
      </div>
    </div>
  </div>

  <!-- ── WRONG SCREEN ───────────────────────────────────── -->
  <div id="wrongScreen">
    <div class="wrong-text" id="wrongText"></div>
    <button class="return-link" id="returnBtn" onclick="dismissWrong()">← return</button>
  </div>

  <!-- ── FREE MARION OVERLAY ─────────────────────────────── -->
  <div id="fmOverlay">
    <!-- HUD corners -->
    <div class="fm-hud tl"></div>
    <div class="fm-hud tr"></div>
    <div class="fm-hud bl"></div>
    <div class="fm-hud br"></div>

    <!-- Giant running man background -->
    <img id="fmRunner" src="images/icon-free-marion.png" alt="" />

    <!-- Login panel -->
    <div class="fm-panel">
      <div class="fm-wordmark">
        FREE MARION
        <span>clearance required</span>
      </div>

      <!-- Identity drum -->
      <div class="fm-drum-wrap">
        <div class="fm-drum-label">Identity</div>
        <div class="fm-drum">
          <button class="fm-drum-arrow" onclick="fmCycle(-1)">&#9650;</button>
          <div class="fm-drum-viewport" id="fmDrumViewport">
            <div class="fm-drum-strip" id="fmDrumStrip">
              <!-- items injected by JS -->
            </div>
          </div>
          <button class="fm-drum-arrow" onclick="fmCycle(1)">&#9660;</button>
        </div>
      </div>

      <!-- Cipher: 10 digit visual track -->
      <div class="fm-cipher-wrap">
        <div class="fm-cipher-label">Cipher</div>
        <div class="fm-cipher-track" id="fmCipherTrack" onclick="document.getElementById('fmCipherInput').focus()">
          <!-- 10 digit boxes injected by JS -->
        </div>
        <input id="fmCipherInput" type="tel" maxlength="10" inputmode="numeric"
               oninput="fmCipherUpdate(this.value)" autocomplete="off" />
      </div>

      <button class="fm-auth-btn" onclick="fmAuth()">Authenticate</button>
      <button class="fm-back" onclick="closeFm()">&#8592; abort</button>
    </div>
  </div>

  <!-- ── MAIN SITE ──────────────────────────────────────── -->
  <div id="mainSite">
    <div class="site-wordmark">Magus Jane</div>

    <!-- Constellation lines SVG -->
    <svg id="constellationSvg" xmlns="http://www.w3.org/2000/svg">
      <!-- lines drawn by JS once layout is known -->
    </svg>

    <div id="siteMenu">
      <!-- nodes injected by JS -->
    </div>
  </div>

  <script>
    // ── MATRIX RAIN ──────────────────────────────────────
    // CIRTH: Tolkien's Dwarvish runes, Unicode Runic block (Elder Futhark +
    //   Anglo-Saxon Futhorc) — the same historical tradition Tolkien drew from.
    const CIRTH = 'ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛊᛏᛒᛖᛗᛚᛜᛞᛟᚫᚩᚪᛝᛡᛥᚴᛔᛕᚳᚻᛦᛤᛣᛢᛠ';
    // SARATI: Tolkien's first Elvish script (predates Tengwar) — visually derived
    //   from Ogham, the Celtic strokes he studied at Oxford. Unicode Ogham block.
    const SARATI = 'ᚁᚂᚃᚄᚅᚆᚇᚈᚉᚊᚋᚌᚍᚎᚏᚐᚑᚒᚓᚔᚕᚖᚗᚘᚙᚚ';
    // BLACK SPEECH: Direct transcription of the One Ring inscription.
    const BS_TOKENS = ['ash','nazg','durb','ulûk','gimb','atul','thraka','agh','burzum','ishi','krimp','û','k'];
    const RING_TEXT = '  ash nazg durbatulûk · ash nazg gimbatul · ash nazg thrakatulûk agh burzum-ishi krimpatul  ';
    const TYPE_CIRTH = 0, TYPE_SARATI = 1, TYPE_BS = 2;

    const mc = document.getElementById('matrix');
    const ctx = mc.getContext('2d');
    let W, H, cols = [], fr = 0;
    const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;

    function initCols(){
      W = mc.width = window.innerWidth;
      H = mc.height = window.innerHeight;
      const base=16, n=Math.floor(W/base); cols=[];
      for(let i=0;i<n;i++){
        const r=Math.random();
        const type=r<.5?TYPE_CIRTH:r<.8?TYPE_SARATI:TYPE_BS;
        const dr=Math.random(), depth=dr<.4?0:dr<.8?1:2;
        const size=Math.round(base*[.55,1,1.5][depth]);
        // Slowed: Cirth drifts, Sarati barely moves, Black Speech creeps
        let speed=type===TYPE_CIRTH?Math.random()*.18+.18:type===TYPE_SARATI?Math.random()*.09+.07:Math.random()*.18+.05;
        cols.push({x:i*base,y:Math.random()*(-(H/size)*2),type,depth,size,speed,bsIdx:0,bsCharIdx:0,bsWord:BS_TOKENS[0]});
      }
    }
    initCols(); window.addEventListener('resize',initCols);

    function drawMatrix(){
      // Lower fade opacity = longer, slower-feeling trails
      ctx.fillStyle='rgba(3,3,3,0.030)'; ctx.fillRect(0,0,W,H);
      const cx=W/2,cy=H/2,gr=ctx.createRadialGradient(cx,cy,0,cx,cy,190+Math.sin(fr*.018)*40);
      gr.addColorStop(0,'rgba(100,0,0,0.12)'); gr.addColorStop(.5,'rgba(50,0,0,0.05)'); gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
      cols.forEach(c=>{
        let ch=c.type===TYPE_CIRTH?CIRTH[rand(0,CIRTH.length-1)]:c.type===TYPE_SARATI?SARATI[rand(0,SARATI.length-1)]:c.bsWord[c.bsCharIdx%c.bsWord.length];
        const yp=c.y*c.size,b=[.07,.14,.27][c.depth],h=Math.random()>.94;
        ctx.fillStyle=c.type===TYPE_CIRTH&&h?'rgba(220,160,80,0.8)':c.type===TYPE_SARATI&&h?'rgba(240,210,100,0.85)':c.type===TYPE_BS&&h?'rgba(130,190,50,0.7)':c.type===TYPE_CIRTH?`rgba(139,0,0,${b+Math.random()*b})`:c.type===TYPE_SARATI?`rgba(170,120,20,${b+Math.random()*b})`:`rgba(55,90,20,${b+Math.random()*b})`;
        ctx.font=`${c.size}px serif`; ctx.fillText(ch,c.x,yp);
        let s=c.speed;
        if(c.type===TYPE_BS){if(Math.random()>.95)s*=(Math.random()*1.4+.1);if(Math.random()>.98)s=0;}
        c.y+=s;
        if(c.type===TYPE_BS&&fr%14===0){c.bsCharIdx++;if(c.bsCharIdx>=c.bsWord.length){c.bsCharIdx=0;c.bsIdx=(c.bsIdx+1)%BS_TOKENS.length;c.bsWord=BS_TOKENS[c.bsIdx];}}
        if(yp>H+20&&Math.random()>.97)c.y=-rand(5,30);
      });
      const cyc=fr%600; let iOp=0;
      if(cyc<60)iOp=cyc/60*.18; else if(cyc<300)iOp=.18; else if(cyc<420)iOp=(1-(cyc-300)/120)*.18;
      if(iOp>.005){
        ctx.save(); ctx.globalAlpha=iOp; ctx.font='13px "Share Tech Mono",monospace'; ctx.fillStyle='rgba(180,130,40,1)';
        const tw=ctx.measureText(RING_TEXT).width,off=(fr*.15)%tw;
        ctx.fillText(RING_TEXT,-off,cy+230); ctx.fillText(RING_TEXT,-off+tw,cy+230); ctx.restore();
      }
      fr++; requestAnimationFrame(drawMatrix);
    }
    drawMatrix();

    // ── INK REVEAL ────────────────────────────────────────
    // Characters seep in one by one — blur fades, opacity rises
    function inkReveal(el, text, msPerChar, done) {
      el.innerHTML = '';
      // Split into lines preserving <br> logic
      const lines = text.split('\n');
      lines.forEach((line, li) => {
        if (li > 0) el.appendChild(document.createElement('br'));
        [...line].forEach((char, i) => {
          const span = document.createElement('span');
          span.textContent = char === ' ' ? '\u00a0' : char;
          span.style.cssText = 'opacity:0;filter:blur(6px);display:inline-block;transition:opacity 1s ease,filter 1.2s ease';
          el.appendChild(span);
          const charPos = el.children.length - 1;
          setTimeout(() => {
            span.style.opacity = '1';
            span.style.filter  = 'blur(0)';
          }, charPos * msPerChar + Math.random() * (msPerChar * 0.7));
        });
      });
      if (done) setTimeout(done, text.replace(/\n/g,'').length * msPerChar + 1400);
    }

    // ── BOOK OPEN ─────────────────────────────────────────
    let opened = false;

    function openBook() {
      if (opened) return; opened = true;
      document.getElementById('bookCover').classList.add('opening');
      document.querySelector('.book-glow').style.cssText='transition:opacity 0.3s;opacity:0';
      document.getElementById('matrix').style.opacity   = '0.1';
      document.getElementById('vignette').style.opacity = '0.12';
      document.getElementById('darkOverlay').classList.add('active');
      setTimeout(() => {
        document.getElementById('pageReveal').classList.add('open');
        inkReveal(document.getElementById('inscription'), 'Speak, Friend,\nand Enter', 68);
        setTimeout(() => document.getElementById('pwd').focus(), 2200);
      }, 520);
    }

    // ── PASSWORD ──────────────────────────────────────────
    function handleKey(e) { if (e.key === 'Enter') checkPwd(); }

    function checkPwd() {
      const val = document.getElementById('pwd').value.toLowerCase().trim();
      if (val === 'mellon' || val === 'melon' || val === 'friend') {
        document.getElementById('pwd').disabled = true;
        showMainSite();
      } else {
        showWrong();
      }
    }

    // ── WRONG ─────────────────────────────────────────────
    function showWrong() {
      const input = document.getElementById('pwd');
      input.value = '';
      // Shake input
      input.style.transition = 'transform 0.07s';
      ['-7px','7px','-4px','4px','0px'].forEach((x,i) =>
        setTimeout(() => input.style.transform = `translateX(${x})`, i * 70)
      );
      // Show wrong screen with ink reveal
      const screen = document.getElementById('wrongScreen');
      const textEl  = document.getElementById('wrongText');
      textEl.innerHTML = '';
      screen.classList.add('visible');
      inkReveal(textEl, 'Beware of unearned wisdom....', 72, () => {
        setTimeout(() => document.getElementById('returnBtn').classList.add('visible'), 400);
      });
    }

    function dismissWrong() {
      document.getElementById('wrongScreen').classList.remove('visible');
      document.getElementById('returnBtn').classList.remove('visible');
      document.getElementById('wrongText').innerHTML = '';
      document.getElementById('pwd').disabled = false;
      setTimeout(() => document.getElementById('pwd').focus(), 300);
    }

    // ── MAIN SITE ─────────────────────────────────────────
    // Scattered positions as % of viewport [left, top]
    const NODES = [
      { id: 'the-lost',    src: 'images/icon-the-lost.png',     label: 'The Lost',    pos: [22, 30], float: 'float-a', action: () => window.location.href = 'the-lost/' },
      { id: 'cherrywood',  src: 'images/icon-cherrywood.png',   label: 'Cherrywood',  pos: [70, 26], float: 'float-b', action: () => window.open('https://cherrywoodgolf.com/', '_blank') },
      { id: 'free-marion', src: 'images/icon-free-marion.png',  label: 'Free Marion', pos: [46, 65], float: 'float-c', action: () => openFm() },
    ];

    // ── FREE MARION ───────────────────────────────────────
    const FM_IDENTITIES = ['Hyperion','Thebes','Keats','Roger','Brutus','Titus','Four'];
    let fmIdx = 0;
    const ITEM_H = 44; // px — must match .fm-drum-item height (2.8rem @ 16px base)

    function fmBuildDrum() {
      const strip = document.getElementById('fmDrumStrip');
      strip.innerHTML = '';
      FM_IDENTITIES.forEach((name, i) => {
        const el = document.createElement('div');
        el.className = 'fm-drum-item';
        el.dataset.idx = i;
        el.textContent = name;
        strip.appendChild(el);
      });
      fmUpdateDrum(false);
    }

    function fmUpdateDrum(animate) {
      const strip = document.getElementById('fmDrumStrip');
      const items = strip.querySelectorAll('.fm-drum-item');
      items.forEach((el, i) => {
        const dist = Math.abs(i - fmIdx);
        el.className = 'fm-drum-item ' + (dist === 0 ? 'active' : dist === 1 ? 'adjacent' : 'far');
      });
      // Scroll strip so active item is centered in the 2.8rem viewport
      strip.style.transform = `translateY(${-fmIdx * ITEM_H}px)`;
    }

    function fmCycle(dir) {
      fmIdx = (fmIdx + dir + FM_IDENTITIES.length) % FM_IDENTITIES.length;
      // Glitch flash
      const vp = document.getElementById('fmDrumViewport');
      vp.classList.add('glitching');
      setTimeout(() => vp.classList.remove('glitching'), 240);
      fmUpdateDrum(true);
    }

    function fmBuildCipher() {
      const track = document.getElementById('fmCipherTrack');
      track.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const box = document.createElement('div');
        box.className = 'fm-cipher-digit';
        box.dataset.pos = i;
        track.appendChild(box);
      }
    }

    function fmCipherUpdate(val) {
      const digits = val.replace(/\D/g,'').slice(0,10);
      document.getElementById('fmCipherInput').value = digits;
      const boxes = document.querySelectorAll('.fm-cipher-digit');
      boxes.forEach((box, i) => {
        box.textContent = digits[i] || '';
        box.className = 'fm-cipher-digit' +
          (i < digits.length ? ' filled' : '') +
          (i === digits.length && digits.length < 10 ? ' active-digit' : '');
      });
    }

    function fmAuth() {
      // Aesthetic — flicker all digits then clear
      const boxes = document.querySelectorAll('.fm-cipher-digit');
      boxes.forEach((b, i) => {
        setTimeout(() => { b.style.opacity = '0'; }, i * 40);
        setTimeout(() => { b.style.opacity = '1'; b.textContent = ''; b.className = 'fm-cipher-digit'; }, i * 40 + 200);
      });
      document.getElementById('fmCipherInput').value = '';
    }

    function openFm() {
      document.getElementById('fmOverlay').classList.add('visible');
      fmBuildDrum();
      fmBuildCipher();
      setTimeout(() => document.getElementById('fmCipherInput').focus(), 600);
    }

    function closeFm() {
      document.getElementById('fmOverlay').classList.remove('visible');
    }

    function showMainSite() {
      document.getElementById('mainSite').classList.add('visible');
      buildMenu();
    }

    function buildMenu() {
      const menu = document.getElementById('siteMenu');
      menu.innerHTML = '';

      NODES.forEach(n => {
        const node = document.createElement('div');
        node.className = `menu-node node-${n.id} ${n.float}`;
        node.style.left = n.pos[0] + '%';
        node.style.top  = n.pos[1] + '%';

        const img = document.createElement('img');
        img.src = n.src; img.alt = n.label; img.className = 'node-img';
        node.appendChild(img);

        const lbl = document.createElement('div');
        lbl.className = 'node-label'; lbl.textContent = n.label;
        node.appendChild(lbl);

        node.addEventListener('click', n.action);
        menu.appendChild(node);
      });

      // Draw constellation lines after layout
      requestAnimationFrame(drawConstellation);
    }

    function drawConstellation() {
      const svg = document.getElementById('constellationSvg');
      svg.innerHTML = '';

      const centers = NODES.map(n => ({
        x: (n.pos[0] / 100) * window.innerWidth,
        y: (n.pos[1] / 100) * window.innerHeight,
      }));

      // Connect all 3 pairs
      [[0,1],[1,2],[0,2]].forEach(([a, b]) => {
        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1', centers[a].x);
        line.setAttribute('y1', centers[a].y);
        line.setAttribute('x2', centers[b].x);
        line.setAttribute('y2', centers[b].y);
        line.setAttribute('stroke', 'rgba(200,178,138,0.5)');
        line.setAttribute('stroke-width', '0.6');
        line.classList.add('const-line');
        // Stagger pulse phase per line
        line.style.animationDelay = `${([0,2.5,5][[0,1,2].indexOf(a)])}s`;
        svg.appendChild(line);
      });

      // Dot at each center
      centers.forEach(c => {
        const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
        dot.setAttribute('cx', c.x); dot.setAttribute('cy', c.y); dot.setAttribute('r', '1.5');
        dot.setAttribute('fill', 'rgba(200,178,138,0.25)');
        svg.appendChild(dot);
      });
    }
  </script>

</body>
</html>
